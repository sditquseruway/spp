  render(){ return `<div class="max-w-3xl mx-auto">
    <div class="grid grid-cols-2 gap-2 mb-3">
      <div class="bg-emerald-50 p-3 rounded-xl text-center"><p class="text-[10px] text-emerald-700 font-bold uppercase">Berhasil</p><p class="text-xl font-extrabold text-emerald-700">${state.syncLog.filter(l=>l.status==='ok').length}</p></div>
      <div class="bg-rose-50 p-3 rounded-xl text-center"><p class="text-[10px] text-rose-700 font-bold uppercase">Gagal</p><p class="text-xl font-extrabold text-rose-700">${state.syncLog.filter(l=>l.status==='err').length}</p></div>
    </div>
    <div class="flex gap-2 mb-3">
      <button onclick="manualSync()" data-testid="log-resync" class="flex-1 bg-amber-500 text-white font-bold rounded-lg p-2"><i class="fas fa-rotate mr-1"></i>Sinkronkan</button>
      <button onclick="pullSpreadsheet(false).then(()=>navigate('log-sync'))" class="flex-1 bg-sky-600 text-white font-bold rounded-lg p-2"><i class="fas fa-cloud-arrow-down mr-1"></i>Tarik Spreadsheet</button>
      <button onclick="window.__panduan()" class="flex-1 bg-slate-700 text-white font-bold rounded-lg p-2"><i class="fas fa-book mr-1"></i>Panduan</button>
    </div>
    <div class="divide-y border rounded-xl bg-white max-h-[55vh] overflow-y-auto">
      ${state.syncLog.length ? state.syncLog.map(l=>`<div class="p-3 flex items-start gap-3" data-testid="log-row-${l.id}">
        <div class="w-7 h-7 rounded-full ${l.status==='ok'?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-700'} flex items-center justify-center text-sm"><i class="fas ${l.status==='ok'?'fa-check':'fa-xmark'}"></i></div>
        <div class="flex-1 min-w-0"><p class="text-sm font-semibold">${esc(l.jenis)} · ${l.jumlah} record · ${esc(l.user)}</p><p class="text-[11px] text-gray-500">${fmtDateTime(l.tanggal)}</p><p class="text-[11px] ${l.status==='ok'?'text-emerald-700':'text-rose-700'}">${esc(l.keterangan||'-')}</p></div>
      </div>`).join('') : '<p class="p-4 text-sm text-gray-400 text-center">Belum ada log.</p>'}
    </div>
  </div>`; },
  mounted(){ window.__panduan=()=>{ openModal(modalBox('Panduan Hubungkan Spreadsheet',`
    <ol class="text-sm space-y-2 list-decimal pl-5">
      <li>Buka Spreadsheet kosong → Extensions → <b>Apps Script</b>.</li>
      <li>Tempel seluruh isi file <code>Code.gs</code> dari repo.</li>
      <li>Deploy → <b>New deployment → Web app</b>. Execute as: <b>Me</b>, Access: <b>Anyone</b>.</li>
      <li>Salin URL Web App, tempel di <b>Pengaturan → URL Apps Script</b>.</li>
      <li>Klik <b>Simpan & Tes</b>. Data otomatis sinkron — Anda juga dapat mengedit langsung di Spreadsheet (format tabel).</li>
    </ol><button onclick="closeModal()" class="mt-4 w-full bg-utama text-white font-bold py-2 rounded-lg">Mengerti</button>`)); };
  }
});

registerPage('receipt',{title:'Bukti Pembayaran',bgClass:'bg-gray-100',
  render(params){ const t=state.transaksi.find(x=>x.id===params.id); if(!t) return '<p class="p-4 text-center text-gray-500">Transaksi tidak ditemukan.</p>';
    const s=state.siswa.find(x=>x.id===t.siswa_id)||{};
    const blnTxt=(Array.isArray(t.bulan)?t.bulan.join(', '):(t.bulan||''))||t.keterangan||'-';
    const no='TRX-'+new Date(t.tanggal).toISOString().slice(0,10).replace(/-/g,'')+'-'+t.id.slice(-5).toUpperCase();
    const logo=state.settings.logoDataURL ? `<img class="r-logo" src="${state.settings.logoDataURL}" alt="">` : '';
    return `<div class="max-w-md mx-auto">
      <div class="bg-white shadow-2xl rounded-xl overflow-hidden">
        <div id="receiptCanvas">
          ${logo}
          <div class="r-title">BUKTI PEMBAYARAN SPP</div>
          <div class="r-sub" style="font-weight:700;margin-top:2px">${esc(sek())}</div>
          <div class="r-sub">${esc(alm())}</div>
          <hr>
          <div class="row"><span>No. Resi</span><span><b>${no}</b></span></div>
          <div class="row"><span>Tanggal</span><span>${fmtDate(t.tanggal)}</span></div>
          <div class="row"><span>TA</span><span>${esc(t.tahun_ajaran||taLabel())}</span></div>
          <div class="row"><span>Kasir</span><span>${esc(t.input_user_nama||'-')}</span></div>
          <div class="row"><span>Metode</span><span><b>${(t.metode||'cash')==='cash'?'💵 CASH':'🏦 TRANSFER'}</b></span></div>
          <hr>
          <div class="row"><span>Nama</span><span><b>${esc(t.nama_siswa||s.nama||'-')}</b></span></div>
          <div class="row"><span>NIS / NISN</span><span>${esc(t.nis||s.nis||'-')} / ${esc(t.nisn||s.nisn||'-')}</span></div>
          <div class="row"><span>Jenjang</span><span><b>${esc(t.jenjang||s.jenjang||'-')}</b></span></div>
          <div class="row"><span>Kelas</span><span>${esc(t.kelas||s.kelas||'-')}</span></div>
          <hr>
          <div class="row"><span>Untuk</span><span style="max-width:60%;text-align:right">${esc(blnTxt)}</span></div>
          <div class="row total"><span>TOTAL BAYAR</span><span>${fmtIDR(t.nominal)}</span></div>
          <hr>
          <div class="r-sub" style="font-size:9.5px;line-height:1.4;margin-top:4px"><b>WAJIB MEMINTA STRUK INI. APABILA TIDAK DICETAK, BOLEH MELAKUKAN SCREENSHOT DAN MENGIRIMKANNYA MELALUI WHATSAPP.</b></div>
          <div class="r-sub" style="margin-top:6px">Terima kasih atas pembayarannya.<br>Semoga ilmu putra/putri Bapak/Ibu berkah. 🤲</div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2 mt-4 no-print">
        <button onclick="window.__rPr()" data-testid="resi-print" class="bg-slate-700 text-white font-bold py-3 rounded-lg"><i class="fas fa-print mr-1"></i>Cetak</button>
        <button onclick="window.__rDl()" data-testid="resi-download" class="bg-sky-600 text-white font-bold py-3 rounded-lg"><i class="fas fa-image mr-1"></i>Simpan Gambar</button>
        <button onclick="window.__rWA('${t.id}')" data-testid="resi-wa" class="col-span-2 bg-[#25D366] text-white font-bold py-3 rounded-lg"><i class="fab fa-whatsapp mr-1"></i>Kirim ke WhatsApp Wali</button>
      </div>
    </div>`; },
  mounted(params){ const t=state.transaksi.find(x=>x.id===params.id); if(!t) return; const s=state.siswa.find(x=>x.id===t.siswa_id)||{};
    window.__rPr=()=>window.print();
    window.__rDl=async ()=>{ if(!window.html2canvas){ toast('Library belum siap.','warn'); return; } const c=await window.html2canvas($('#receiptCanvas'),{backgroundColor:'#fff',scale:2}); const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='Resi_'+(t.nama_siswa||'siswa')+'_'+new Date(t.tanggal).toISOString().slice(0,10)+'.png'; a.click(); toast('Disimpan.'); };
    window.__rWA=async ()=>{ const wa=normalizeWA(s.no_wa||''); if(!wa){ toast('No WA wali belum diisi.','warn'); return; }
      if(!window.html2canvas){ toast('Library belum siap.','warn'); return; }
      const c=await window.html2canvas($('#receiptCanvas'),{backgroundColor:'#fff',scale:2}); const du=c.toDataURL('image/png');
      try{ const blob=await (await fetch(du)).blob(); const file=new File([blob],'resi-'+t.id+'.png',{type:'image/png'});
        if(navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'Bukti Pembayaran SPP',text:'Bukti Pembayaran SPP a.n '+t.nama_siswa+'\nTotal: '+fmtIDR(t.nominal)}); return; }
      }catch(e){}
      const a=document.createElement('a'); a.href=du; a.download='Resi_'+(t.nama_siswa||'siswa')+'.png'; a.click();
      const txt=`*Bukti Pembayaran SPP*%0A${encodeURIComponent(sek())}%0A%0AAtas nama: *${encodeURIComponent(t.nama_siswa||'')}*%0AJenjang/Kelas: ${encodeURIComponent((t.jenjang||'')+'/'+(t.kelas||'-'))}%0ATotal: *${encodeURIComponent(fmtIDR(t.nominal))}*%0AMetode: ${(t.metode||'cash')==='cash'?'CASH':'TRANSFER'}%0AUntuk: ${encodeURIComponent((Array.isArray(t.bulan)?t.bulan.join(', '):t.bulan)||t.keterangan||'-')}%0A%0AGambar bukti pembayaran tersimpan, mohon dilampirkan pada chat ini.%0A%0A_Terima kasih._`;
      window.open('https://wa.me/'+wa+'?text='+txt,'_blank'); toast('Gambar diunduh — lampirkan di chat WA.','info');
    };
  }
});

})();</script>
