<script>
/* ============================================================
   INFAQ SANTRI APP — Single-file PWA
   ============================================================ */
(()=>{ 'use strict';

/* ===== CONST ===== */
const BULAN_LIST=['Juli','Agustus','September','Oktober','November','Desember','Januari','Februari','Maret','April','Mei','Juni'];
const BULAN_FULL=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const JENJANG_LIST=['TK','SD','SMP'];
const JALUR_LIST=['Bontot','Dhuafa TK','Dhuafa SD','Dhuafa SMP','Yatim TK','Yatim SD','Yatim SMP','Khusus','Reguler TK','Reguler SD','Reguler SMP'];
function jalurOptions(){ const set=new Set(JALUR_LIST); (state.siswa||[]).forEach(s=>{ if(s&&s.jalur) set.add(String(s.jalur).trim()); }); return Array.from(set).filter(Boolean).sort(); }
const APP_KEY='isa_state_v2', QUEUE_KEY='isa_queue_v2', SESSION_KEY='isa_session_v2';

/* ===== UTIL ===== */
const $ =(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const fmtIDR=n=>'Rp '+(Number(n||0)).toLocaleString('id-ID');
const todayISO=()=>new Date().toISOString();
const uid=()=>'id_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=iso=>{ if(!iso)return'-'; try{return new Date(iso).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}catch{return iso} };
const fmtDateTime=iso=>{ if(!iso)return'-'; try{return new Date(iso).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}catch{return iso} };
const normalizeWA=s=>{ if(!s)return''; let n=String(s).replace(/[^\d]/g,''); if(n.startsWith('0'))n='62'+n.slice(1); else if(n.startsWith('8'))n='62'+n; return n; };
const currentMonthIdx=()=>new Date().getMonth();
const currentYear=()=>new Date().getFullYear();
const taLabel=()=>state.settings.tahunAjaran||'2026/2027';
/* Rupiah input formatter: 1000000 -> "1.000.000" */
const onlyDigits=v=>String(v||'').replace(/[^\d]/g,'');
const fmtThousand=v=>{ const d=onlyDigits(v); return d?Number(d).toLocaleString('id-ID'):''; };
function attachRupiahMask(el){
  if(!el || el.__rpMasked) return; el.__rpMasked=true;
  if(el.type==='number') el.type='text';
  el.inputMode='numeric'; el.autocomplete='off';
  if(el.value) el.value=fmtThousand(el.value);
  el.addEventListener('input',()=>{ const c=el.value; const f=fmtThousand(c); if(c!==f) el.value=f; });
}
function bindAllRupiah(root){ (root||document).querySelectorAll('input[data-rupiah]').forEach(attachRupiahMask); }
const rupiahVal=el=>Number(onlyDigits(el?.value||0))||0;
const jsq=v=>JSON.stringify(String(v??''));
function findSiswaById(id){
  const key=String(id??'');
  return (state.siswa||[]).find(x=>String(x&&x.id)===key);
}
function normalizeSiswaRecord(s){
  if(!s || typeof s!=='object') return s;
  if(s.id==null || String(s.id).trim()===''){
    const base=[s.nis,s.nisn,s.nama,s.kelas,s.tahun_ajaran||taLabel()].map(x=>String(x||'').trim().toLowerCase()).join('|');
    s.id='sid_'+(base||uid()).replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60);
  }
  ['nama','nis','nisn','jenjang','kelas','jalur','status','wali','no_wa','tahun_ajaran'].forEach(k=>{ if(s[k]==null) s[k]=''; else s[k]=String(s[k]); });
  if(!s.status) s.status='aktif';
  if(!s.tahun_ajaran) s.tahun_ajaran=taLabel();
  s.pembayaran_bulanan=Number(onlyDigits(s.pembayaran_bulanan||0))||0;
  return s;
}
function normalizeAllSiswa(){ if(Array.isArray(state.siswa)) state.siswa=state.siswa.map(normalizeSiswaRecord).filter(Boolean); }
window.attachRupiahMask=attachRupiahMask; window.bindAllRupiah=bindAllRupiah; window.rupiahVal=rupiahVal;

/* TA: "2026/2027" → start year 2026 (Jul) end year 2027 (Jun) */
function taYears(ta){ const [a,b]=String(ta||taLabel()).split('/').map(x=>parseInt(x,10)||0); return [a,b]; }
function inTA(date, ta=taLabel()){ const d=date instanceof Date ? date : new Date(date); const [y1,y2]=taYears(ta); const t=d.getTime(); const start=new Date(y1,6,1).getTime(); const end=new Date(y2,5,30,23,59,59).getTime(); return t>=start && t<=end; }
function bulanWajibInTA(ta=taLabel()){
  const [y1,y2]=taYears(ta);
  const now=new Date();
  const taEnd=new Date(y2,5,30); // 30 Juni
  const taStart=new Date(y1,6,1); // 1 Juli
  const cur=now>taEnd?taEnd:(now<taStart?taStart:now);
  const result=[];
  for(const b of BULAN_LIST){
    const mi=BULAN_FULL.indexOf(b);
    const yr = mi>=6 ? y1 : y2;
    const dateOfBulan=new Date(yr,mi,1);
    if(dateOfBulan<=cur) result.push(b);
  }
  return result;
}
function bulanWajibSampai(bulanCap, ta=taLabel()){
  if(!bulanCap) return bulanWajibInTA(ta);
  const idx=BULAN_LIST.indexOf(bulanCap);
  return idx>=0 ? BULAN_LIST.slice(0, idx+1) : bulanWajibInTA(ta);
}

/* ===== TOAST ===== */
function toast(msg,type='success'){
  const el=$('#toast'),cont=$('#toastContent'),ic=$('#toastIcon'),tx=$('#toastText');
  tx.textContent=msg;
  cont.className='flex items-center px-4 py-3 rounded-lg shadow-2xl text-white font-medium text-sm '+({success:'bg-emerald-600',error:'bg-red-600',warn:'bg-amber-500',info:'bg-sky-600'}[type]||'bg-gray-800');
  ic.className='mr-2 text-lg fas '+({success:'fa-circle-check',error:'fa-circle-xmark',warn:'fa-triangle-exclamation',info:'fa-circle-info'}[type]||'fa-circle-info');
  el.classList.remove('hidden');
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.classList.add('hidden'),2800);
}
window.toast=toast;

/* ===== STATE ===== */
const defaultState=()=>({
  users:[
    { id:'u_admin', username:'admin', password:'admin', nama:'Bendahara Pusat', role:'admin', no_wa:'', aktif:true, created_at:todayISO() }
  ],
  siswa:[],
  transaksi:[],
  kategori:[],
  tunggakanLalu:[],
  bukuHutang:[],
  syncLog:[],
  settings:{
    namaSekolah:"YAYASAN HUDA WAN NURUL QUR'ANI",
    alamatSekolah:"Tangsi Lama, Seruway, Aceh Tamiang",
    logoDataURL:'https://iili.io/fFA80TF.md.png',
    tahunAjaran:'2026/2027',
    tahunAjaranList:['2026/2027'],
    sppTK:150000, sppSD:200000, sppSMP:300000,
    bulanGratis:[], // No.7: bulan gratis dari yayasan utk semua siswa (tidak dihitung tagihan)
    bulanGratisKelas:{}, // {kelas: [bulan,...]}
    bulanGratisSiswa:{}, // {siswaId: [bulan,...]}
    ttdKepala:'', ttdBendahara:'', // No.19: nama penandatangan utk laporan PDF
    waSenderNumber:'',
    waTemplate:`Assalamu'alaikum wr.wb.
Yth. Wali Santri *{NAMA}*
Kami informasikan tagihan SPP/Infaq:

• Jenjang/Kelas: {JENJANG}/{KELAS}
• Tahun Ajaran: {TA}
• Total Tunggakan: *{TOTAL}*
• Rincian: {RINCIAN}

Mohon segera diselesaikan. Jazakumullahu khairan.
_{SEKOLAH}_`,
    gasUrl:'https://script.google.com/macros/s/AKfycbxbCQiLm1v90Jy5b3_MpClEbIOarKulhZSRQ7e7WbdjxrdR-fh8APfr69qBlDaIaIg/exec', lastSyncAt:null, lastSyncStatus:'idle'
  }
});
let state=loadState();
let queue=JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');
let session=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');

function loadState(){
  try{ const raw=localStorage.getItem(APP_KEY);
    if(!raw){ const f=defaultState(); localStorage.setItem(APP_KEY,JSON.stringify(f)); return f; }
    const p=JSON.parse(raw); const d=defaultState();
    for(const k of Object.keys(d)) if(p[k]===undefined) p[k]=d[k];
    for(const k of Object.keys(d.settings)) if(p.settings[k]===undefined) p.settings[k]=d.settings[k];
    // Pastikan URL default selalu terisi (override nilai kosong dari versi sebelumnya)
    if(!p.settings.gasUrl) p.settings.gasUrl=d.settings.gasUrl;
    if(!p.settings.logoDataURL) p.settings.logoDataURL=d.settings.logoDataURL;
    localStorage.setItem(APP_KEY,JSON.stringify(p));
    return p;
  }catch(e){ console.error(e); return defaultState(); }
}
function saveState(){ localStorage.setItem(APP_KEY,JSON.stringify(state)); }
function saveQueue(){ localStorage.setItem(QUEUE_KEY,JSON.stringify(queue)); }
function saveSession(){ localStorage.setItem(SESSION_KEY,JSON.stringify(session)); }

/* ===== SYNC ===== */
function enqueue(entity,op,payload){
  // v18: peringatan bila offline — data tetap disimpan lokal untuk retry,
  // tapi bendahara diingatkan agar catat manual di buku bila jaringan mati lama.
  if(!navigator.onLine){
    toast('⚠️ Tidak ada internet — data disimpan sementara di HP, WAJIB catat manual juga di buku.','warn');
  }
  // ANTI-DOUBLE INPUT: jika sudah ada op pending untuk entity+id yang sama,
  // ganti op lama dengan yang baru (jangan tambah duplikat ke queue).
  const pid = payload && (payload.id || payload.op_id);
  if(pid){
    queue = queue.filter(q => !(
      q.status==='pending' && q.entity===entity && q.op===op &&
      q.payload && (q.payload.id===pid || q.payload.op_id===pid)
    ));
  }
  queue.push({op_id:uid(),entity,op,payload,ts:todayISO(),retry:0,status:'pending'});
  saveQueue(); setSyncDot('sync');
  // Auto-sync langsung tanpa delay – data terkirim ke Spreadsheet seketika
  Promise.resolve().then(()=>flushQueue(false));
}
function setSyncDot(s){
  const d=$('#syncDot'),t=$('#syncStatusText'); if(!d) return;
  d.className='sync-dot '+s; state.settings.lastSyncStatus=s;
  if(s==='sync') t.textContent='Menyinkronkan…';
  else if(s==='ok') t.textContent='Tersinkron · '+(state.settings.lastSyncAt?fmtDateTime(state.settings.lastSyncAt):'baru saja');
  else if(s==='err') t.textContent='Gagal sinkron — akan dicoba ulang';
  else t.textContent=state.settings.gasUrl?'Live · siap':'Spreadsheet belum dihubungkan';
}
async function gasFetch(url, body){
  // Pakai application/x-www-form-urlencoded → "simple request" CORS
  // → TIDAK memicu preflight, response bisa dibaca, dan Apps Script
  // membacanya lewat e.parameter.payload (paling reliable).
  const form=new URLSearchParams();
  form.append('payload', JSON.stringify(body||{}));
  try{
    const r=await fetch(url,{method:'POST',redirect:'follow',body:form});
    const txt=await r.text();
    let j; try{ j=JSON.parse(txt); }catch(_){ j={ok:true,raw:txt}; }
    return {ok:true,data:j};
  }catch(err){
    // Fallback: no-cors fire-and-forget (data tetap sampai ke Spreadsheet)
    try{
      await fetch(url,{method:'POST',mode:'no-cors',redirect:'follow',body:form});
      return {ok:true,data:{ok:true,opaque:true}};
    }catch(e2){
      return {ok:false,error:err.message||String(err)};
    }
  }
}
// FIX v13: guard agar TIDAK ada dua flushQueue jalan paralel (penyebab double row di spreadsheet).
let __flushBusy=false;
async function flushQueue(manual=false){
  if(!state.settings.gasUrl){ if(manual) toast('Hubungkan URL Spreadsheet dulu di Pengaturan.','warn'); setSyncDot('idle'); return false; }
  if(!navigator.onLine){ setSyncDot('err'); return false; }
  if(__flushBusy){ return false; }
  if(queue.length===0){ if(manual) return await pushSnapshot(true); setSyncDot('ok'); return true; }
  __flushBusy=true;
  try{
    setSyncDot('sync');
    // hanya ambil yang benar-benar 'pending' (skip in_flight) lalu tandai in_flight
    const batch=queue.filter(q=>q.status==='pending').slice(0,50);
    if(!batch.length){ setSyncDot('ok'); return true; }
    batch.forEach(b=>{ b.status='in_flight'; }); saveQueue();
    const res=await gasFetch(state.settings.gasUrl,{action:'push',ops:batch,user:session?.username||'sistem'});
    if(res.ok && (res.data.ok || res.data.opaque)){
      const ids=new Set(batch.map(b=>b.op_id));
      queue=queue.filter(q=>!ids.has(q.op_id)); saveQueue();
      state.settings.lastSyncAt=todayISO();
      state.syncLog.unshift({id:uid(),tanggal:todayISO(),jenis:'push',jumlah:batch.length,user:session?.username||'sistem',status:'ok',keterangan:batch.length+' operasi terkirim'+(res.data.opaque?' (mode opaque)':'')});
      state.syncLog=state.syncLog.slice(0,200); saveState(); setSyncDot('ok');
      if(manual) toast('✅ '+batch.length+' data tersinkron.','success');
      return true;
    }
    // gagal → kembalikan ke pending utk retry
    batch.forEach(b=>{ b.status='pending'; b.retry=(b.retry||0)+1; }); saveQueue();
    state.syncLog.unshift({id:uid(),tanggal:todayISO(),jenis:'push',jumlah:batch.length,user:session?.username||'sistem',status:'err',keterangan:String(res.error||res.data?.error||'Gagal')});
    saveState(); setSyncDot('err'); if(manual) toast('❌ Sinkronisasi gagal: '+(res.error||''),'error'); return false;
  } finally { __flushBusy=false; }
}
async function pushSnapshot(manual=false){
  if(!state.settings.gasUrl) return false; setSyncDot('sync');
  const snap={users:state.users,siswa:state.siswa,transaksi:state.transaksi,kategori:state.kategori,tunggakanLalu:state.tunggakanLalu,bukuHutang:state.bukuHutang,settings:state.settings};
  const res=await gasFetch(state.settings.gasUrl,{action:'snapshot',data:snap,user:session?.username||'sistem'});
  if(res.ok && (res.data.ok || res.data.opaque)){
    state.settings.lastSyncAt=todayISO();
    state.syncLog.unshift({id:uid(),tanggal:todayISO(),jenis:'snapshot',jumlah:1,user:session?.username||'sistem',status:'ok',keterangan:'Snapshot terkirim'+(res.data.opaque?' (mode opaque)':'')});
    saveState(); setSyncDot('ok'); if(manual) toast('✅ Snapshot terkirim ke Spreadsheet.','success'); return true;
  }
  state.syncLog.unshift({id:uid(),tanggal:todayISO(),jenis:'snapshot',jumlah:1,user:session?.username||'sistem',status:'err',keterangan:String(res.error||res.data?.error||'Gagal')});
  saveState(); setSyncDot('err'); if(manual) toast('❌ Snapshot gagal: '+(res.error||''),'error'); return false;
}
async function pullSpreadsheet(silent=false){
  if(!state.settings.gasUrl){ if(!silent) toast('Hubungkan URL Spreadsheet dulu.','warn'); return false; }
  setSyncDot('sync');
  try{
    const u=state.settings.gasUrl; const sep=u.includes('?')?'&':'?';
    let j=null;
    // Coba GET dulu (Apps Script doGet support CORS untuk simple GET)
    try{
      const r=await fetch(u+sep+'action=pull',{method:'GET',redirect:'follow'});
      j=await r.json();
    }catch(getErr){
      // Fallback: POST action=pull (tidak preflight karena no Content-Type)
      const res=await gasFetch(u,{action:'pull'});
      if(!res.ok) throw new Error(res.error||'Gagal pull');
      j=res.data;
    }
    if(!j || !j.ok) throw new Error((j&&j.error)||'Gagal pull');
    // Replace data tabel-wise; jangan timpa gasUrl lokal
    if(Array.isArray(j.Users)){
      // FIX v12: MERGE users (jangan timpa) supaya password yang baru diubah lokal tapi belum sync
      // tidak hilang. Aturan: server menang utk user yang sudah ada di server; user lokal yang
      // belum ada di server dipertahankan.
      const srvIds = new Set(j.Users.map(u=>String(u.id||'')));
      const localOnly = state.users.filter(u=>!srvIds.has(String(u.id||'')));
      state.users = j.Users.length ? j.Users.concat(localOnly) : state.users;
    }
    if(Array.isArray(j.Siswa)){ state.siswa=j.Siswa.map(normalizeSiswaRecord).filter(Boolean); }
    if(Array.isArray(j.Transaksi)) {
      // FIX v12: defensif — pastikan setiap transaksi punya `tipe`.
      // FIX v13: dedupe by id (jaga-jaga kalau spreadsheet pernah double row).
      const __seen=new Set();
      state.transaksi = j.Transaksi.map(t=>{
        if(!t) return t;
        if(!t.tipe){
          if(t.siswa_id || t.nama_siswa || t.bulan_nominal) t.tipe='spp_in';
          else if(Number(t.nominal||0) >= 0) t.tipe='kas_in';
        }
        return t;
      }).filter(t=>{ const id=String(t&&t.id||''); if(!id) return true; if(__seen.has(id)) return false; __seen.add(id); return true; });
    }
    if(Array.isArray(j.Kategori)) state.kategori=j.Kategori;
    if(Array.isArray(j.TunggakanLalu)) state.tunggakanLalu=j.TunggakanLalu;
    if(Array.isArray(j.BukuHutang)) state.bukuHutang=j.BukuHutang;
    if(j.Settings && typeof j.Settings==='object'){
      const localGas=state.settings.gasUrl;
      Object.assign(state.settings, j.Settings);
      state.settings.gasUrl=localGas;
      ['sppTK','sppSD','sppSMP'].forEach(k=>{ if(state.settings[k]!==undefined) state.settings[k]=Number(state.settings[k])||0; });
      if(typeof state.settings.tahunAjaranList==='string'){ try{ state.settings.tahunAjaranList=JSON.parse(state.settings.tahunAjaranList) }catch(e){} }
    }
    state.settings.lastSyncAt=todayISO(); saveState(); setSyncDot('ok');
    if(!silent) toast('✅ Data ditarik dari Spreadsheet.','success');
    return true;
  }catch(err){ setSyncDot('err'); if(!silent) toast('❌ Pull gagal: '+(err.message||''),'error'); return false; }
}
async function manualSync(){
  // FIX v13: jangan kirim snapshot bareng push — bisa menyebabkan baris ganda.
  // Push antrian dulu, lalu pull untuk re-sync.
  await flushQueue(true);
  if(state.settings.gasUrl){ await pullSpreadsheet(true); }
  if(currentPage) navigate(currentPage); // refresh tampilan
}

/* ===== v18: PULL-TO-REFRESH (touch + mouse) ===== */
(function installPTR(){
  const IND = ()=>document.getElementById('ptrIndicator');
  const wrap = ()=>document.getElementById('pageContainer');
  let startY=0, pulling=false, dist=0, active=false;
  const THRESHOLD=80;
  function onStart(y){
    const w=wrap(); if(!w) return;
    // hanya trigger jika scroll di atas
    const active_view=w.querySelector('.page-view.active');
    if(active_view && active_view.scrollTop>4) return;
    pulling=true; startY=y; dist=0;
  }
  function onMove(y){
    if(!pulling) return;
    dist=Math.max(0,y-startY);
    if(dist>10){
      const ind=IND(); if(ind){ ind.classList.add('show'); ind.style.transform='translateX(-50%) translateY('+Math.min(dist*0.4,50)+'px) rotate('+(dist*2)+'deg)'; }
    }
  }
  function onEnd(){
    if(!pulling) return; pulling=false;
    const ind=IND();
    if(dist>THRESHOLD && !active){
      if(confirm('🔄 Yakin ingin REFRESH tarik data dari Spreadsheet?\n\nSemua perubahan yang belum tersimpan bisa hilang / tertimpa.\nLanjut?')){
        active=true;
        if(ind){ ind.classList.add('show'); ind.style.transform='translateX(-50%)'; ind.innerHTML='<div class="ring"></div>'; }
        pullSpreadsheet(false).finally(()=>{
          active=false;
          if(ind){ ind.classList.remove('show'); ind.innerHTML='<i class="arrow fas fa-arrow-down"></i>'; ind.style.transform='translateX(-50%)'; }
          if(currentPage) navigate(currentPage);
        });
        return;
      }
    }
    if(ind){ ind.classList.remove('show'); ind.style.transform='translateX(-50%)'; }
    dist=0;
  }
  document.addEventListener('touchstart',(e)=>onStart(e.touches[0].clientY),{passive:true});
  document.addEventListener('touchmove',(e)=>onMove(e.touches[0].clientY),{passive:true});
  document.addEventListener('touchend',onEnd,{passive:true});
  // desktop drag: pakai pointer di header/area atas
  let mDown=false;
  document.addEventListener('mousedown',(e)=>{ if(e.clientY<160){ mDown=true; onStart(e.clientY); } });
  document.addEventListener('mousemove',(e)=>{ if(mDown) onMove(e.clientY); });
  document.addEventListener('mouseup',()=>{ if(mDown){ mDown=false; onEnd(); } });
})();

/* ===== HELPERS: SPP / TUNGGAKAN =====
   Tarif siswa = pembayaran_bulanan personal jika diisi (>0); fallback ke tarif jenjang.
*/
function tarifJenjang(jenjang){ return Number({TK:state.settings.sppTK,SD:state.settings.sppSD,SMP:state.settings.sppSMP}[jenjang]||0); }
function getSppTarif(arg){
  // v14 (No.5): tarif HANYA dari data siswa (pembayaran_bulanan). Tidak ada fallback ke pengaturan.
  if(arg && typeof arg==='object'){ return Number(arg.pembayaran_bulanan||0); }
  return 0;
}
function sppTrxBySiswa(id,ta=taLabel()){ return state.transaksi.filter(t=>t.tipe==='spp_in' && t.siswa_id===id && (t.tahun_ajaran||taLabel())===ta); }
function bulanTerbayar(id,ta=taLabel()){ const set=new Set(); sppTrxBySiswa(id,ta).forEach(t=>{ const b=Array.isArray(t.bulan)?t.bulan:(t.bulan?String(t.bulan).split(',').map(s=>s.trim()).filter(Boolean):[]); b.forEach(x=>set.add(x)); }); return set; }
function terbayarRp(id,ta=taLabel()){ return sppTrxBySiswa(id,ta).reduce((s,t)=>s+Number(t.nominal||0),0); }
function bulanGratisFor(s){
  const set=new Set(state.settings.bulanGratis||[]);
  const bk=(state.settings.bulanGratisKelas||{})[s.kelas||'']; if(Array.isArray(bk)) bk.forEach(b=>set.add(b));
  const bs=(state.settings.bulanGratisSiswa||{})[s.id||'']; if(Array.isArray(bs)) bs.forEach(b=>set.add(b));
  return set;
}
// v14 (No.1): jumlah Rp yang sudah terbayar untuk bulan tertentu (akumulasi semua transaksi)
function bulanTerbayarRp(siswaId, ta=taLabel()){
  const map={};
  sppTrxBySiswa(siswaId,ta).forEach(t=>{
    const bm = t.bulan_nominal && typeof t.bulan_nominal==='object' ? t.bulan_nominal : null;
    const arr = Array.isArray(t.bulan)?t.bulan:(t.bulan?String(t.bulan).split(',').map(x=>x.trim()).filter(Boolean):[]);
    if(bm && Object.keys(bm).length){ Object.keys(bm).forEach(b=>{ map[b]=(map[b]||0)+Number(bm[b]||0); }); }
    else if(arr.length){ const per=Number(t.nominal||0)/arr.length; arr.forEach(b=>{ map[b]=(map[b]||0)+per; }); }
  });
  return map; // bulan -> Rp
}
// v14: status bulan = 'lunas' | 'partial' | 'belum' | 'gratis'
function statusBulan(siswa, bulan, ta=taLabel()){
  if(bulanGratisFor(siswa).has(bulan)) return {status:'gratis', paid:0, tarif:getSppTarif(siswa), sisa:0};
  const tarif=getSppTarif(siswa);
  const paid=bulanTerbayarRp(siswa.id,ta)[bulan]||0;
  if(tarif<=0) return {status:'belum', paid:0, tarif:0, sisa:0};
  if(paid>=tarif) return {status:'lunas', paid, tarif, sisa:0};
  if(paid>0) return {status:'partial', paid, tarif, sisa:tarif-paid};
  return {status:'belum', paid:0, tarif, sisa:tarif};
}
function tunggakanLaluSiswa(s){
  return state.tunggakanLalu.filter(t =>
    (s.nis && t.nis && String(t.nis)===String(s.nis)) ||
    (s.nisn && t.nisn && String(t.nisn)===String(s.nisn)) ||
    (s.nama && t.nama && String(t.nama).trim().toLowerCase()===String(s.nama).trim().toLowerCase())
  );
}
function tunggakanLaluTotal(s){ return tunggakanLaluSiswa(s).reduce((sm,t)=>sm+Number(t.jumlah||0),0); }
/* Tunggakan = (jumlah bulan wajib × tarif_terbaru_siswa) − total nominal terbayar di TA itu.
   Jika siswa bulan ini hanya bayar sebagian (mis. 200rb dari 450rb), selisih otomatis menjadi tunggakan
   karena perhitungan berbasis nominal terbayar, bukan jumlah bulan dicentang. */
function hitungTunggakan(s,opts={}){
  const ta=opts.ta||taLabel();
  const sampaiBulan=opts.sampaiBulan||null;
  const tarif=getSppTarif(s);
  const bulanWajib= sampaiBulan ? bulanWajibSampai(sampaiBulan,ta) : bulanWajibInTA(ta);
  // v14: gabungan bulan gratis global+kelas+individu
  const free = bulanGratisFor(s);
  const wajibBayar = bulanWajib.filter(b=>!free.has(b));
  const expected = wajibBayar.length * tarif;
  const paid=terbayarRp(s.id,ta);
  const tBerjalan=Math.max(0,expected-paid);
  const tLalu=tunggakanLaluTotal(s);
  return { tarif, bulanWajib, wajibBayar, bulanGratis:[...free], expected, paid, tBerjalan, tLalu, total: tBerjalan + tLalu };
}

/* ===== SALDO ===== */
function isAdmin(){ return session?.role==='admin'; }
function isInMasuk(t){ return ['spp_in','kas_in'].includes(t.tipe); }
function isOutKas(t){ return t.tipe==='kas_out'; }
function saldoMetode(metode, sumber='bendahara'){
  let s=0;
  state.transaksi.forEach(t=>{
    if(t.tipe==='internal_move'){
      if(t.from_metode===metode) s -= Number(t.nominal||0);
      if(t.to_metode===metode)   s += Number(t.nominal||0);
      return;
    }
    if((t.sumber||'tangan')!==sumber) return;
    if((t.metode||'cash')!==metode) return;
    if(isInMasuk(t)) s += Number(t.nominal||0);
    else if(isOutKas(t)) s -= Number(t.nominal||0);
  });
  // Setoran masuk dari guru menambah bendahara pada metode masing-masing
  if(sumber==='bendahara'){
    state.transaksi.forEach(t=>{
      if(t.tipe==='setor' && (t.metode||'cash')===metode){
        s += Number(t.nominal||0); // dianggap sudah include di kas_in dengan sumber bendahara, namun di setor masuk: pakai ref_setor_id ke kas_in
      }
    });
    // Avoid double count: simpler — saldo bendahara = sum of all transactions with sumber=bendahara, by metode
  }
  return s;
}
/* Simpler & robust per-metode bendahara */
function saldoBendaharaCash(){ return saldoSumberMetode('bendahara','cash'); }
function saldoBendaharaTransfer(){ return saldoSumberMetode('bendahara','transfer'); }
function saldoSumberMetode(sumber, metode){
  let s=0;
  state.transaksi.forEach(t=>{
    if(t.tipe==='internal_move'){
      if(t.from_metode===metode) s -= Number(t.nominal||0);
      if(t.to_metode===metode)   s += Number(t.nominal||0);
      return;
    }
    if((t.sumber||'tangan')!==sumber) return;
    const tm = t.metode || 'cash';
    if(tm!==metode) return;
    if(isInMasuk(t)) s += Number(t.nominal||0);
    else if(isOutKas(t)) s -= Number(t.nominal||0);
  });
  return s;
}
function saldoUserDiTangan(userId){
  let s=0;
  state.transaksi.forEach(t=>{
    if(t.input_user_id!==userId) return;
    if((t.sumber||'tangan')!=='tangan') return;
    if(t.tipe==='spp_in'||t.tipe==='kas_in') s += Number(t.nominal||0);
    else if(t.tipe==='kas_out') s -= Number(t.nominal||0);
    else if(t.tipe==='setor') s -= Number(t.nominal||0);
  });
  return s;
}
function totalSekolah(){ return saldoBendaharaCash()+saldoBendaharaTransfer(); }
function adminUser(){ return state.users.find(u=>u.role==='admin') || { id:'u_admin', nama:'Bendahara Pusat' }; }
/* v18: total saldo guru (dana yg masih di tangan semua guru) */
function saldoGuruTotal(){
  return state.users.filter(u=>u.role==='guru').reduce((s,u)=>s+Math.max(0,saldoUserDiTangan(u.id)),0);
}
function totalSaldoAll(){ return saldoBendaharaCash()+saldoBendaharaTransfer()+saldoGuruTotal(); }
/* v18: total tunggakan (untuk baris ringkasan di dashboard pusat) */
function totalTunggakanAll(){
  let tot=0, jml=0;
  state.siswa.filter(s=>(s.status||'aktif')==='aktif').forEach(s=>{ const c=hitungTunggakan(s); if(c.total>0){ tot+=c.total; jml++; } });
  return {tot,jml};
}

/* ===== BUKU HUTANG (v18 balik):
   Kas MASUK  → kategori "Hutang Operasional" = MENERIMA pinjaman (nambah hutang).
   Kas KELUAR → kategori "Bayar Hutang"       = MELUNASI hutang.
   Kategori lain TIDAK dicatat di Buku Hutang. */
function rekapHutang(){
  const entries=[];
  state.transaksi.forEach(t=>{
    if(t.tipe==='kas_in' && t.kategori==='Hutang Operasional'){
      entries.push({ id:'t_'+t.id, tanggal:t.tanggal, keterangan:'(Pinjam) '+(t.keterangan||'-'), jumlah_pinjam:Number(t.nominal||0), jumlah_bayar:0, input_user_nama:t.input_user_nama||'-', source:'kas' });
    } else if(t.tipe==='kas_out' && t.kategori==='Bayar Hutang'){
      entries.push({ id:'t_'+t.id, tanggal:t.tanggal, keterangan:'(Bayar) '+(t.keterangan||'-'), jumlah_pinjam:0, jumlah_bayar:Number(t.nominal||0), input_user_nama:t.input_user_nama||'-', source:'kas' });
    }
  });
  state.bukuHutang.forEach(h=>entries.push({...h, source:h.source||'manual'}));
  entries.sort((a,b)=> new Date(b.tanggal||b.created_at) - new Date(a.tanggal||a.created_at));
  const totPinjam = entries.reduce((s,e)=>s+Number(e.jumlah_pinjam||0),0);
  const totBayar  = entries.reduce((s,e)=>s+Number(e.jumlah_bayar||0),0);
  // Daftar hutang per item: status 'Lunas' jika jumlah_bayar>=jumlah_pinjam (per entri pinjam).
  const pinjamItems = entries.filter(e=>e.jumlah_pinjam>0).map(e=>({...e, status: 'belum'}));
  // Alokasi pembayaran (FIFO) ke pinjaman tertua:
  let sisaBayar=totBayar;
  const pinjamAsc=[...pinjamItems].sort((a,b)=> new Date(a.tanggal)-new Date(b.tanggal));
  pinjamAsc.forEach(p=>{ const need=Number(p.jumlah_pinjam||0); if(sisaBayar>=need){ p.status='lunas'; p.terbayar=need; sisaBayar-=need; } else if(sisaBayar>0){ p.status='sebagian'; p.terbayar=sisaBayar; sisaBayar=0; } else { p.terbayar=0; } });
  return { entries, totPinjam, totBayar, sisa: totPinjam-totBayar, pinjamItems: pinjamAsc.reverse() };
}
function ensureHutangKategori(){
  const has=(n,t)=>state.kategori.some(k=>k.nama===n&&k.tipe===t);
  let changed=false;
  if(!has('Hutang Operasional','in')){ const k={id:uid(),nama:'Hutang Operasional',tipe:'in',created_at:todayISO()}; state.kategori.push(k); enqueue('kategori','upsert',k); changed=true; }
  if(!has('Bayar Hutang','out')){ const k={id:uid(),nama:'Bayar Hutang',tipe:'out',created_at:todayISO()}; state.kategori.push(k); enqueue('kategori','upsert',k); changed=true; }
  if(changed) saveState();
}

    const c2 = confirm('KONFIRMASI TERAKHIR\n\nKetik OK untuk MENGHAPUS pembayaran ini secara permanen.\n\nTindakan ini akan dikirim ke Spreadsheet dan tidak bisa dibatalkan setelahnya.');
    if(!c2) { toast('Dibatalkan.','info'); return; }
    state.transaksi = state.transaksi.filter(x=>x.id!==trxId);
    saveState();
    enqueue('transaksi','delete',{id:trxId});
    toast('✅ Pembayaran dibatalkan. Saldo & tunggakan disesuaikan.','success');
    // re-render panel siswa
    try { renderSppPanel(siswaId); } catch(_){ navigate('spp'); }
  };
  // FIX v12 (no.1): UBAH nominal bulan yang sudah dibayar tanpa duplikat.
  // Membatalkan transaksi lama lalu membuat transaksi baru dengan nominal baru.
  window.__sppEditBln = (bulan, siswaId, trxId)=>{
    const s = state.siswa.find(x=>x.id===siswaId); if(!s) return;
    const old = state.transaksi.find(x=>x.id===trxId);
    const oldNom = old && old.bulan_nominal && old.bulan_nominal[bulan]!=null ? Number(old.bulan_nominal[bulan]) : Number(old?.nominal||0);
    const inp = prompt('Ubah nominal bulan '+bulan+' untuk '+s.nama+'\n\nNominal lama: '+fmtIDR(oldNom)+'\n\nMasukkan nominal BARU (angka, tanpa titik):', String(oldNom));
    if(inp==null) return;
    const newNom = Number(String(inp).replace(/[^\d]/g,''));
    if(!(newNom>0)){ toast('Nominal tidak valid.','warn'); return; }
    if(newNom===oldNom){ toast('Nominal sama, tidak ada perubahan.','info'); return; }
    if(!confirm('Konfirmasi: ubah nominal '+bulan+' dari '+fmtIDR(oldNom)+' → '+fmtIDR(newNom)+' ?\n\nTransaksi lama akan DIBATALKAN dan diganti transaksi baru.\nSaldo otomatis disesuaikan.')) return;
    // Jika trx lama HANYA berisi bulan ini → batalkan total.
    // Jika berisi banyak bulan → batalkan total lalu re-input bulan-bulan lain dengan nominal sebelumnya, dan bulan ini dengan nominal baru.
    if(old){
      const arr = Array.isArray(old.bulan)?old.bulan.slice():(old.bulan?String(old.bulan).split(',').map(x=>x.trim()).filter(Boolean):[]);
      const bm = (old.bulan_nominal && typeof old.bulan_nominal==='object') ? Object.assign({},old.bulan_nominal) : {};
      // kalau bulan_nominal kosong, derivasi rata
      arr.forEach(b=>{ if(bm[b]==null) bm[b] = Math.round(Number(old.nominal||0)/arr.length); });
      // hapus transaksi lama (soft delete via enqueue)
      state.transaksi = state.transaksi.filter(x=>x.id!==trxId);
      enqueue('transaksi','delete',{id:trxId});
      // bulan-bulan lain → buat ulang dengan nominal sebelumnya (kalau ada)
      const others = arr.filter(b=>b!==bulan);
      if(others.length){
        const u=sess();
        const newMap={}; others.forEach(b=> newMap[b]=Number(bm[b]||0));
        const total = Object.values(newMap).reduce((s,v)=>s+v,0);
        const trxKeep={ id:uid(), tipe:'spp_in', tanggal:old.tanggal||new Date().toISOString(), tahun_ajaran:old.tahun_ajaran||taLabel(), metode:old.metode||'cash',
          siswa_id:s.id, nama_siswa:s.nama, nis:s.nis, nisn:s.nisn, jenjang:s.jenjang, kelas:s.kelas,
          bulan:others, bulan_nominal:newMap, nominal:total, kategori:'SPP', keterangan:'SPP (otomatis dari edit) '+others.join(', '),
          input_user_id:u.id, input_user_nama:u.nama, input_user_role:u.role,
          sumber: u.role==='admin'?'bendahara':'tangan', created_at:new Date().toISOString() };
        state.transaksi.unshift(trxKeep); enqueue('transaksi','upsert',trxKeep);
      }
    }
    // Transaksi BARU untuk bulan yang diubah
    const u=sess(); const trxNew={ id:uid(), tipe:'spp_in', tanggal:new Date().toISOString(), tahun_ajaran:taLabel(), metode:(old&&old.metode)||'cash',
      siswa_id:s.id, nama_siswa:s.nama, nis:s.nis, nisn:s.nisn, jenjang:s.jenjang, kelas:s.kelas,
      bulan:[bulan], bulan_nominal:{[bulan]:newNom}, nominal:newNom, kategori:'SPP',
      keterangan:'Ubah nominal '+bulan+' menjadi '+fmtIDR(newNom),
      input_user_id:u.id, input_user_nama:u.nama, input_user_role:u.role,
      sumber: u.role==='admin'?'bendahara':'tangan', created_at:new Date().toISOString() };
    state.transaksi.unshift(trxNew); saveState(); enqueue('transaksi','upsert',trxNew);
    toast('✅ Nominal '+bulan+' diperbarui.','success');
    try { renderSppPanel(siswaId); } catch(_){ navigate('spp'); }
  };
  window.__sppT();
}

    $('#kT').value=new Date().toISOString().slice(0,10);

    window.__kasMode='out'; window.__kasMet='cash';
    window.__kT=(m)=>{ window.__kasMode=m; ['kTi','kTo'].forEach(i=>{ const e=$('#'+i); e.classList.remove('text-utama','border-utama','text-gray-400','border-transparent'); });
      $('#kTi').classList.add(m==='in'?'text-utama':'text-gray-400', m==='in'?'border-utama':'border-transparent');
      $('#kTo').classList.add(m==='out'?'text-utama':'text-gray-400', m==='out'?'border-utama':'border-transparent');
      // v18: BALIK analogi — Kas Masuk "Hutang Operasional" = terima pinjaman; Kas Keluar "Bayar Hutang" = melunasi.
      const __builtIn = m==='in' ? [{nama:'Hutang Operasional'}] : [{nama:'Bayar Hutang'}];
      const __exist = state.kategori.filter(k=>k.tipe===m);
      const __merged = [...__builtIn.filter(b=>!__exist.some(e=>e.nama===b.nama)), ...__exist];
      $('#kK').innerHTML = __merged.map(k=>`<option value="${esc(k.nama)}">${esc(k.nama)}</option>`).join('')||'<option value="">(tambah kategori dulu)</option>';
    };
    window.__kM=(m)=>{ window.__kasMet=m; $('#kmC').classList.toggle('active',m==='cash'); $('#kmT').classList.toggle('active',m==='transfer'); };
    window.__kT('out');
    window.__kR=()=>{ const u=sess(); const mine=state.transaksi.filter(t=>(t.tipe==='kas_in'||t.tipe==='kas_out')&&t.input_user_id===u.id).slice(0,10);
      $('#kL').innerHTML = mine.length ? mine.map(t=>{ const iIn=t.tipe==='kas_in';

          <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm ${iIn?'bg-emerald-100 text-emerald-700':'bg-red-100 text-red-700'}"><i class="fas ${iIn?'fa-arrow-down':'fa-arrow-up'}"></i></div>
          <div class="flex-1 min-w-0"><p class="text-sm font-semibold truncate">${esc(t.kategori)} <span class="text-[10px] bg-gray-100 px-1.5 rounded">${(t.metode||'cash')==='cash'?'💵':'🏦'}</span></p><p class="text-[11px] text-gray-500 truncate">${esc(t.keterangan||'-')} · ${fmtDate(t.tanggal)}</p></div>
          <p class="${iIn?'text-emerald-700':'text-red-700'} font-bold text-sm">${iIn?'+':'-'}${fmtIDR(t.nominal)}</p>
        </div>`; }).join('') : '<p class="p-4 text-sm text-gray-400 text-center">Belum ada transaksi.</p>'; };
    window.__kR();
    window.__kS=(ev)=>{ ev.preventDefault(); const u=sess(); const m=window.__kasMode;
      const kat=$('#kK').value, n=rupiahVal($('#kN')), tgl=new Date($('#kT').value||new Date()).toISOString(), ket=$('#kK2').value.trim();
      if(!kat){ toast('Pilih kategori dulu.','warn'); return; }
      if(n<=0){ toast('Nominal tidak valid.','warn'); return; }
      const trx={ id:uid(), tipe: m==='in'?'kas_in':'kas_out', tanggal:tgl, tahun_ajaran:taLabel(), metode:window.__kasMet,
        kategori:kat, nominal:n, keterangan:ket,
        input_user_id:u.id, input_user_nama:u.nama, input_user_role:u.role,
        sumber: u.role==='admin'?'bendahara':'tangan', created_at:new Date().toISOString() };
      state.transaksi.unshift(trx); saveState(); enqueue('transaksi','upsert',trx);
      const noteHutang = (m==='in'&&kat==='Hutang Operasional')?' (Tercatat sebagai PINJAMAN BARU di Buku Hutang)':((m==='out'&&kat==='Bayar Hutang')?' (Tercatat sebagai PELUNASAN di Buku Hutang)':'');
      toast('✅ Catatan kas tersimpan.'+noteHutang,'success');
      $('#kN').value=''; $('#kK2').value=''; $('#kT').value=new Date().toISOString().slice(0,10);
      window.__kR();
    };
  }
});

          <div class="grid grid-cols-2 gap-3">

      if(submitBtn && submitBtn.dataset.busy==='1') return;

      const d={ id:id||uid(), nis:$('#f_nis').value.trim(), nisn:$('#f_nisn').value.trim(), nama:$('#f_nama').value.trim(), jenjang:$('#f_j').value, kelas:$('#f_k').value.trim(), jalur:($('#f_jl').value||'').trim()||'Reguler SD', pembayaran_bulanan:pb, wali:$('#f_w').value.trim(), no_wa:$('#f_wa').value.trim(), tahun_ajaran:$('#f_t').value, status:$('#f_st').value, updated_at:new Date().toISOString() };
      if(!d.nama){ toast('Nama wajib diisi.','warn'); return; }
      // v17: pembayaran_bulanan boleh 0 (yatim / khusus). Tidak diblok.
      // v14: konfirmasi dihilangkan; klik tombol Simpan langsung memproses.
      // FIX v13 (no.2): cek duplikat (NIS+nama) untuk siswa baru
      if(!id){
        const key=(d.nis||'').toLowerCase()+'|'+d.nama.toLowerCase();
        const dup=state.siswa.find(s=>(((s.nis||'').toLowerCase()+'|'+(s.nama||'').toLowerCase())===key));
        if(dup){ toast('Siswa "'+d.nama+'" sudah ada di database.','warn'); return; }
      }
      if(submitBtn){ submitBtn.dataset.busy='1'; submitBtn.disabled=true; submitBtn.innerHTML='<i class="fas fa-spinner fa-spin mr-2"></i>Menyimpan…'; }
      if(id){ const i=state.siswa.findIndex(s=>String(s.id)===String(id)); if(i>=0) state.siswa[i]={...state.siswa[i], ...d}; else { toast('Data siswa tidak ditemukan.','error'); return; } }
      else { d.created_at=new Date().toISOString(); state.siswa.unshift(d); }
      saveState(); enqueue('siswa','upsert',d); closeModal(); window.__sR(); toast('✅ Tersimpan.');
      // jangan panggil flushQueue lagi — enqueue() sudah memicu auto-flush sekali.
    };
    window.__sDel=(id)=>{ id=String(id||''); if(!id) return; if(!confirm('Hapus siswa? Riwayat transaksi tidak terhapus.')) return;
      state.siswa=state.siswa.filter(x=>String(x.id)!==id); saveState(); enqueue('siswa','delete',{id}); window.__sR(); toast('Dihapus.','info');
    };
    window.__sWA=(id)=>{ const s=state.siswa.find(x=>x.id===id); if(!s) return;
      if(!s.no_wa){ toast('Nomor WA wali belum diisi.','warn'); return; }
      const c=hitungTunggakan(s);
      const txt=`*Info Tagihan SPP*\n${sek()}\n\nAnanda: *${s.nama}*\nNIS: ${s.nis||'-'} · ${s.jenjang}/${s.kelas||'-'}\nJalur: ${s.jalur||'Reguler'}\nTarif/bln: ${fmtIDR(c.tarif)}\n\nSudah dibayar TA ${taLabel()}: ${fmtIDR(c.paid)}\nTunggakan berjalan: ${fmtIDR(c.tBerjalan)}${c.tLalu>0?`\nTunggakan tahun lalu: ${fmtIDR(c.tLalu)}`:''}\n*Total Tunggakan: ${fmtIDR(c.total)}*\n\nMohon segera diselesaikan. Terima kasih 🙏`;
      window.open(`https://wa.me/${normalizeWA(s.no_wa)}?text=${encodeURIComponent(txt)}`,'_blank');
    };
    // No.3 & No.4: Template berbentuk TABEL (Excel .xlsx) + paste tabel (TAB / koma / titik koma)
    window.__sImport=()=>{ openModal(modalBox('Import Massal Siswa (Tabel)',`
      <p class="text-xs text-gray-700 mb-2">Gunakan <b>format tabel</b> — unduh template Excel lalu isi, atau tempel langsung dari Excel/Google Sheet (otomatis terdeteksi).</p>
      <p class="text-[11px] text-gray-500 mb-2">Kolom: <b>No · Nama · NIS · NISN · Jenjang · Kelas · Jalur · No WA · Pembayaran Bulanan</b>. Kolom "No" opsional, "Bayar Tahunan" dihitung otomatis.</p>
      <div class="flex gap-2 mb-2">
        <button onclick="window.__sTemplate()" class="flex-1 text-xs bg-emerald-600 text-white py-2 rounded font-bold"><i class="fas fa-file-excel mr-1"></i>Unduh Template Excel</button>
        <label class="flex-1 text-xs bg-sky-600 text-white py-2 rounded font-bold text-center cursor-pointer"><i class="fas fa-file-import mr-1"></i>Pilih File Excel<input type="file" id="bImpFile" accept=".xlsx,.xls,.csv" class="hidden" onchange="window.__sBulkFile(event)"></label>
      </div>
      <p class="text-[11px] text-gray-500 mb-1">Atau tempel langsung dari Excel di sini:</p>
      <textarea id="bImp" rows="7" placeholder="No&#9;Nama&#9;NIS&#9;NISN&#9;Jenjang&#9;Kelas&#9;Jalur&#9;No WA&#9;Pembayaran Bulanan&#10;1&#9;Aisyah&#9;2026001&#9;0123456789&#9;SD&#9;3A&#9;Reguler SD&#9;6281234567890&#9;450000" class="w-full border rounded p-2 bg-gray-50 font-mono text-xs" data-testid="siswa-bulk-text"></textarea>
      <div id="bImpPrev" class="mt-2 max-h-40 overflow-auto text-[11px] hidden"></div>
      <button onclick="window.__sBulkDo()" data-testid="siswa-bulk-import" class="w-full bg-utama text-white font-bold py-2 rounded-lg mt-2">Import ke Database</button>`));
      // live preview tabel
      setTimeout(()=>{ const ta=$('#bImp'); if(ta) ta.addEventListener('input',()=>window.__sBulkPrev()); },100);
    };
    // Template TABEL (xlsx via SheetJS jika ada, fallback CSV)
    window.__sTemplate=()=>{
      const hdr=['No','Nama','NIS','NISN','Jenjang','Kelas','Jalur','No WA','Pembayaran Bulanan','Bayar Tahunan'];
      const rows=[hdr,
        [1,'Contoh Siswa','2026001','0123456789','SD','3A','Reguler SD','6281234567890',450000,5400000],
        [2,'Contoh Yatim','2026002','0987654321','SMP','7B','Yatim SMP','6285678901234',300000,3600000]];
      if(window.XLSX){
        const ws=XLSX.utils.aoa_to_sheet(rows); ws['!cols']=hdr.map(h=>({wch:Math.max(12,h.length+2)}));
        const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Siswa');
        XLSX.writeFile(wb,'template_siswa.xlsx'); return;
      }
      const tsv=rows.map(r=>r.join('\t')).join('\n');
      const a=document.createElement('a'); a.href='data:text/tab-separated-values;charset=utf-8,'+encodeURIComponent(tsv); a.download='template_siswa.tsv'; a.click();
    };
    window.__sBulkFile=(ev)=>{ const f=ev.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=(e)=>{
        const data=e.target.result;
        if(window.XLSX && /\.xlsx?$/i.test(f.name)){
          try{ const wb=XLSX.read(data,{type:'binary'}); const ws=wb.Sheets[wb.SheetNames[0]];
            const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
            $('#bImp').value=rows.map(r=>r.join('\t')).join('\n'); window.__sBulkPrev(); toast('File dibaca — periksa preview lalu klik Import.','info');
          }catch(err){ toast('Gagal baca xlsx: '+err.message,'error'); }
        } else { $('#bImp').value=data; window.__sBulkPrev(); }
      };
      if(/\.xlsx?$/i.test(f.name)) r.readAsBinaryString(f); else r.readAsText(f);
    };
    function _splitRow(l){ if(l.includes('\t')) return l.split('\t'); if(l.includes(';')) return l.split(';'); return l.split(','); }
    window.__sBulkPrev=()=>{
      const raw=$('#bImp').value.trim(); const prev=$('#bImpPrev'); if(!raw){ prev.classList.add('hidden'); return; }
      const lines=raw.split(/\r?\n/).filter(l=>l.trim()).slice(0,10);
      const rows=lines.map(l=>_splitRow(l).map(x=>String(x).trim()));
      prev.classList.remove('hidden');
      prev.innerHTML='<div class="font-bold mb-1 text-gray-600">Preview '+rows.length+' baris pertama:</div><table class="w-full border text-[10px]"><tbody>'+
        rows.map((r,i)=>`<tr class="${i===0?'bg-emerald-100 font-bold':'border-t'}">${r.map(c=>`<td class="border px-1 py-0.5">${esc(c)}</td>`).join('')}</tr>`).join('')+'</tbody></table>';
    };
    window.__sBulkDo=()=>{ const raw=$('#bImp').value.trim(); if(!raw){ toast('Tempel data dulu.','warn'); return; }
      const lines=raw.split(/\r?\n/).filter(l=>l.trim());
      // FIX v13: konfirmasi sebelum kirim massal
      if(!confirm('Import '+lines.length+' baris siswa ke database & Spreadsheet?\n\nBaris duplikat (NIS+Nama sama) otomatis dilewati.')) return;
      let ok=0, skip=0, dup=0;
      const existingKeys=new Set(state.siswa.map(s=>(String(s.nis||'').trim()+'|'+String(s.nama||'').toLowerCase().trim())));
      lines.forEach(l=>{
        const lower=l.toLowerCase();
        if(/^(no|nama)[\t,;]/.test(lower)) return; // skip header
        const p=_splitRow(l).map(x=>String(x).trim());
        let cols=p;
        // Buang kolom "No" jika baris diawali angka murni dan kolom cukup banyak
        if(cols.length>=8 && /^\d+$/.test(cols[0])) cols=cols.slice(1);
        // FIX v13 (no.9): layout BARU dengan KELAS — nama, nis, nisn, jenjang, kelas, jalur, no_wa, pembayaran_bulanan
        let nama='',nis='',nisn='',jen='',kelas='',jalur='',no_wa='',pb='';
        if(cols.length>=8){
          [nama,nis,nisn,jen,kelas,jalur,no_wa,pb]=cols;
        } else if(cols.length===7){
          // layout lama tanpa kelas: nama,nis,nisn,jenjang,jalur,no_wa,pb
          [nama,nis,nisn,jen,jalur,no_wa,pb]=cols;
        } else {
          // minimal: nama,nis,nisn,jenjang,jalur,pb (tanpa wa)
          [nama,nis,nisn,jen,jalur,pb]=cols;
        }
        if(!nama){ skip++; return; }
        no_wa=String(no_wa||'').replace(/[^\d+]/g,'');
        const pbNum=Number(String(pb||'').replace(/[^\d]/g,''))||0;
        const key=String(nis||'').trim()+'|'+String(nama||'').toLowerCase().trim();
        if(existingKeys.has(key)){ dup++; return; }
        existingKeys.add(key);
        const d={ id:uid(), nama, nis:nis||'', nisn:nisn||'', jenjang:JENJANG_LIST.includes(jen)?jen:'SD', kelas:kelas||'', jalur:(jalur||'').trim()||'Reguler', pembayaran_bulanan:pbNum, wali:'', no_wa, tahun_ajaran:taLabel(), status:'aktif', created_at:new Date().toISOString() };
        state.siswa.unshift(d); enqueue('siswa','upsert',d); ok++;
      });
      saveState(); closeModal(); window.__sR();
      toast(`✅ ${ok} siswa terimport.`+(skip?` ${skip} dilewati.`:'')+(dup?` ${dup} duplikat dilewati.`:''), ok?'success':'warn');
    };
    window.__sR();
  }
});

function buildRekapitulasi(list, ta){
  // Pemasukan SPP per jenjang
  const sppByJen={};
  ['TK','SD','SMP'].forEach(j=>sppByJen[j]=0);
  let sppLain=0, infaq=0, bayarHutang=0, kasInLain=0;
  list.filter(t=>t.tipe==='spp_in').forEach(t=>{
    const j=(t.jenjang||'').toUpperCase();
    if(sppByJen[j]!==undefined) sppByJen[j]+=Number(t.nominal||0);
    else sppLain+=Number(t.nominal||0);
  });
  list.filter(t=>t.tipe==='kas_in').forEach(t=>{
    const k=String(t.kategori||'').toLowerCase();
    if(k==='bayar hutang') bayarHutang+=Number(t.nominal||0);
    else if(k.includes('infaq')||k.includes('infak')) infaq+=Number(t.nominal||0);
    else kasInLain+=Number(t.nominal||0);
  });
  const pemasukan=[
    {label:'Pemasukan SPP Santri TK', val:sppByJen.TK},
    {label:'Pemasukan SPP Santri SD', val:sppByJen.SD},
    {label:'Pemasukan SPP Santri SMP', val:sppByJen.SMP},
  ];
  if(sppLain>0) pemasukan.push({label:'Pemasukan SPP Lainnya', val:sppLain});
  pemasukan.push({label:'Pemasukan Bayar Hutang', val:bayarHutang});
  pemasukan.push({label:'Pemasukan Infaq', val:infaq});
  if(kasInLain>0) pemasukan.push({label:'Pemasukan Kas Lain-lain', val:kasInLain});
  // Pengeluaran by kategori
  const outMap={};
  list.filter(t=>t.tipe==='kas_out').forEach(t=>{ const k=t.kategori||'Lain-lain'; outMap[k]=(outMap[k]||0)+Number(t.nominal||0); });
  const pengeluaran=Object.entries(outMap).map(([k,v])=>({label:'Belanja '+k, val:v})).sort((a,b)=>b.val-a.val);
  const totMasuk=pemasukan.reduce((a,b)=>a+b.val,0);
  const totKeluar=pengeluaran.reduce((a,b)=>a+b.val,0);
  // Tunggakan per jenjang (s/d bulan berjalan)
  const tgByJen={TK:0,SD:0,SMP:0,Lainnya:0};
  let tgCnt={TK:0,SD:0,SMP:0,Lainnya:0};
  state.siswa.filter(s=>(s.status||'aktif')==='aktif').forEach(sw=>{
    const c=hitungTunggakan(sw,{ta:ta||taLabel()});
    if(c.total<=0) return;
    const j=(sw.jenjang||'').toUpperCase();
    const key=(j==='TK'||j==='SD'||j==='SMP')?j:'Lainnya';
    tgByJen[key]+=c.total; tgCnt[key]+=1;
  });
  const totTunggakan=Object.values(tgByJen).reduce((a,b)=>a+b,0);
  return {pemasukan,pengeluaran,totMasuk,totKeluar,saldo:totMasuk-totKeluar,tgByJen,tgCnt,totTunggakan};
}
function generatePDF(list,m,y,ta){
  const { jsPDF } = window.jspdf || {};
  if(!jsPDF){ toast('PDF belum siap.','warn'); return; }
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const bL=m===''?'Semua Bulan':BULAN_FULL[+m];
  const PW=doc.internal.pageSize.getWidth(), PH=doc.internal.pageSize.getHeight();
  // ===== KOP HEADER (No.19) =====
  let hy=40;
  if(state.settings.logoDataURL){ try{ doc.addImage(state.settings.logoDataURL,'PNG',45,hy,55,55,undefined,'FAST'); }catch(e){} }
  doc.setFont('helvetica','bold').setFontSize(15).text(String(sek()||'').toUpperCase(), PW/2, hy+14,{align:'center'});
  doc.setFont('helvetica','normal').setFontSize(9).text(alm()||'', PW/2, hy+30,{align:'center'});
  doc.setLineWidth(1.2).line(40, hy+58, PW-40, hy+58);
  doc.setLineWidth(0.4).line(40, hy+62, PW-40, hy+62);
  // Judul
  let y2 = hy+82;
  doc.setFont('helvetica','bold').setFontSize(13).text('LAPORAN KEUANGAN BULANAN', PW/2, y2,{align:'center'});
  y2+=14;
  doc.setFont('helvetica','normal').setFontSize(10).text(`Periode: ${bL} ${y||''}   ·   Tahun Ajaran: ${ta||taLabel()}`, PW/2, y2,{align:'center'});
  y2+=18;
  // ===== REKAPITULASI (HALAMAN 1) =====
  let mC=0,kC=0; const masuk=[], keluar=[];
  list.forEach(t=>{ const n=Number(t.nominal||0); if(['spp_in','kas_in'].includes(t.tipe)){ mC+=n; masuk.push(t);} else if(t.tipe==='kas_out'){ kC+=n; keluar.push(t);} });
  const REK=buildRekapitulasi(list, ta);
  doc.setFont('helvetica','bold').setFontSize(11).text('REKAPITULASI PEMASUKAN', 40, y2); y2+=4;
  doc.autoTable({ startY:y2+4,

        .replaceAll('{NAMA}',s.nama).replaceAll('{JENJANG}',s.jenjang).replaceAll('{KELAS}',s.kelas||'-')
        .replaceAll('{TA}', s.tahun_ajaran||taLabel())
        .replaceAll('{TOTAL}',fmtIDR(c.total))
        .replaceAll('{RINCIAN}',rincian)
        .replaceAll('{SEKOLAH}', sek());
      const sender = normalizeWA(state.settings.waSenderNumber||'');
      const target = wa; // pesan dikirim ke wali
      // Jika ada sender, sarankan klik tetap pakai wa.me ke target (sender bukan parameter wa.me, hanya catatan UX)
      window.open('https://wa.me/'+target+'?text='+encodeURIComponent(msg),'_blank');
    };
    window.__tCetak=()=>{
      const { jsPDF } = window.jspdf || {};
      if(!jsPDF){ toast('PDF belum siap.','warn'); return; }
      const q=($('#tgC').value||'').toLowerCase(), bln=$('#tgBln').value, ta=$('#tgTA').value||taLabel(), jen=($('#tgJen')&&$('#tgJen').value)||'', kls=($('#tgKls')&&$('#tgKls').value)||'';
      const items=state.siswa.filter(s=>(s.status||'aktif')==='aktif')
        .filter(s=>!jen || s.jenjang===jen)
        .filter(s=>!kls || String(s.kelas||'').trim()===kls)
        .map(s=>({s,c:hitungTunggakan(s,{ta, sampaiBulan:bln||null})}))
        .filter(x=>x.c.total>0)
        .filter(x=>!q || x.s.nama.toLowerCase().includes(q)||String(x.s.nis||'').toLowerCase().includes(q)||String(x.s.nisn||'').toLowerCase().includes(q))
        .sort((a,b)=>(a.s.kelas||'').localeCompare(b.s.kelas||'')||(a.s.nama||'').localeCompare(b.s.nama||''));
      if(!items.length){ toast('Tidak ada data tunggakan untuk filter ini.','warn'); return; }
      const doc=new jsPDF({unit:'pt',format:'a4'});
      const PW=doc.internal.pageSize.getWidth();
      let hy=40;
      if(state.settings.logoDataURL){ try{ doc.addImage(state.settings.logoDataURL,'PNG',45,hy,55,55,undefined,'FAST'); }catch(e){} }
      doc.setFont('helvetica','bold').setFontSize(14).text(String(sek()||'').toUpperCase(), PW/2, hy+14,{align:'center'});
      doc.setFont('helvetica','normal').setFontSize(9).text(alm()||'', PW/2, hy+30,{align:'center'});
      doc.setLineWidth(1).line(40, hy+58, PW-40, hy+58);
      let y=hy+78;
      doc.setFont('helvetica','bold').setFontSize(13).text('LAPORAN TUNGGAKAN SANTRI', PW/2, y, {align:'center'}); y+=16;
      const lbl=[]; if(jen) lbl.push('Jenjang: '+jen); if(kls) lbl.push('Kelas: '+kls); if(!lbl.length) lbl.push('Semua Kelas');
      lbl.push('TA: '+ta); if(bln) lbl.push('s/d Bulan '+bln);
      doc.setFont('helvetica','normal').setFontSize(10).text(lbl.join('   ·   '), PW/2, y, {align:'center'}); y+=8;
      const total=items.reduce((a,b)=>a+b.c.total,0);
      doc.autoTable({ startY:y+8,
        head:[['No','Nama Santri','NIS','NISN','Jenjang/Kelas','Total Tunggakan']],
        body: items.map((x,i)=>[i+1, x.s.nama, x.s.nis||'-', x.s.nisn||'-', (x.s.jenjang+'/'+(x.s.kelas||'-')), fmtIDR(x.c.total)]),
        styles:{fontSize:9,cellPadding:4}, headStyles:{fillColor:[244,63,94]},
        columnStyles:{0:{halign:'center',cellWidth:28},5:{halign:'right'}},
        foot:[[{content:'TOTAL TUNGGAKAN ('+items.length+' santri)',colSpan:5,styles:{halign:'right',fontStyle:'bold',textColor:[136,19,55]}},{content:fmtIDR(total),styles:{halign:'right',fontStyle:'bold',fillColor:[254,226,226],textColor:[136,19,55]}}]]
      });
      let y2=doc.lastAutoTable.finalY+30;
      const PH=doc.internal.pageSize.getHeight();
      if(y2>PH-100){ doc.addPage(); y2=60; }
      const tglStr=new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
      doc.setFont('helvetica','normal').setFontSize(10);
      doc.text(tglStr, PW-90, y2, {align:'right'});
      doc.setFont('helvetica','bold').text('Bendahara', PW-90, y2+14, {align:'right'});
      doc.text(state.settings.ttdBendahara||'(……………………………)', PW-90, y2+78, {align:'right'});
      doc.setLineWidth(0.4).line(PW-200, y2+80, PW-50, y2+80);
      doc.save('Laporan_Tunggakan_'+(kls||jen||'Semua')+'_'+ta.replace('/','-')+'.pdf');
      toast('✅ Laporan tunggakan diunduh.','success');
    };
    window.__tWAAll=async ()=>{
      const items=state.siswa.filter(s=>(s.status||'aktif')==='aktif')
        .map(s=>({s,c:hitungTunggakan(s,{ta:$('#tgTA').value||taLabel(), sampaiBulan:$('#tgBln').value||null})}))
        .filter(x=>x.c.total>0 && normalizeWA(x.s.no_wa||''));
      if(!items.length){ toast('Tidak ada siswa menunggak dengan no WA.','warn'); return; }
      if(!confirm('Akan membuka '+items.length+' tab WhatsApp (delay 2 detik antar tab) supaya tidak diblok. Lanjut?')) return;
      for(let i=0;i<items.length;i++){ const {s}=items[i]; window.__tWA(s.id); if(i<items.length-1) await new Promise(r=>setTimeout(r,2000)); }
      toast('Selesai. Kirim manual tiap tab.','info');
    };
  }
});

      const elK=$('#pgBgKelas'); if(elK){
        const kls=[...new Set((state.siswa||[]).map(s=>(s.kelas||'').trim()).filter(Boolean))].sort();
        const bkMap=state.settings.bulanGratisKelas||{};
        elK.innerHTML = kls.length ? kls.map(k=>`<div class="bg-white border rounded p-2"><p class="text-[11px] font-bold text-emerald-700 mb-1">Kelas ${esc(k)}</p><div class="grid grid-cols-4 sm:grid-cols-6 gap-1">`+BULAN_LIST.map(b=>{const ck=(bkMap[k]||[]).includes(b); return `<label class="flex items-center gap-1 border rounded p-1 text-[10px] cursor-pointer ${ck?'bg-emerald-50 border-emerald-400':'border-gray-200'}"><input type="checkbox" class="pg-bgk" data-k="${esc(k)}" value="${b}" ${ck?'checked':''}> <span>${b.slice(0,3)}</span></label>`;}).join('')+'</div></div>').join('') : '<p class="text-[11px] text-gray-400">Belum ada kelas di data siswa.</p>';
      }
      window.__pgBgsR=function(){ const el=$('#pgBgsList'); if(!el) return; const q=($('#pgBgsCari').value||'').toLowerCase().trim();
        const bsMap=state.settings.bulanGratisSiswa||{};
        const list=(state.siswa||[]).filter(s=>(s.status||'aktif')==='aktif' && (!q || (s.nama||'').toLowerCase().includes(q))).slice(0,30);
        el.innerHTML = list.length ? list.map(s=>`<div class="bg-white border rounded p-2"><p class="text-[11px] font-bold text-sky-700 mb-1">${esc(s.nama)} <span class="text-gray-500 font-normal">· ${esc(s.jenjang)}/${esc(s.kelas||'-')}</span></p><div class="grid grid-cols-4 sm:grid-cols-6 gap-1">`+BULAN_LIST.map(b=>{const ck=(bsMap[s.id]||[]).includes(b); return `<label class="flex items-center gap-1 border rounded p-1 text-[10px] cursor-pointer ${ck?'bg-sky-50 border-sky-400':'border-gray-200'}"><input type="checkbox" class="pg-bgs" data-s="${s.id}" value="${b}" ${ck?'checked':''}> <span>${b.slice(0,3)}</span></label>`;}).join('')+'</div></div>').join('') : '<p class="text-[11px] text-gray-400">Ketik nama untuk mencari siswa.</p>';
      }; window.__pgBgsR();
    })();
    window.__pgLogo=(input)=>{ const f=input.files[0]; if(!f) return; if(f.size>700000){ toast('Logo terlalu besar (>700KB).','warn'); return; }
      const r=new FileReader(); r.onload=(e)=>{ state.settings.logoDataURL=e.target.result; saveState(); enqueue('settings','upsert',state.settings); $('#lgPv').src=e.target.result; document.getElementById('headerLogo')&&(document.getElementById('headerLogo').src=e.target.result, document.getElementById('headerLogo').classList.remove('hidden')); toast('Logo tersimpan.'); }; r.readAsDataURL(f);
    };
    window.__pgLogoDel=()=>{ if(!confirm('Hapus logo?')) return; state.settings.logoDataURL=''; saveState(); enqueue('settings','upsert',state.settings); navigate('pengaturan'); };
    window.__pgIdt=()=>{ state.settings.namaSekolah=$('#pgNm').value.trim(); state.settings.alamatSekolah=$('#pgAlm').value.trim(); saveState(); enqueue('settings','upsert',state.settings); toast('Tersimpan.'); };
    window.__pgLogoUrl=()=>{ const u=($('#pgLogoUrl').value||'').trim(); if(!/^https?:\/\//i.test(u)){ toast('URL harus dimulai http(s)://','warn'); return; }
      state.settings.logoDataURL=u; saveState(); enqueue('settings','upsert',state.settings); $('#lgPv').src=u; const h=document.getElementById('headerLogo'); if(h){h.src=u; h.classList.remove('hidden');} applyLogo(); toast('Logo URL tersimpan.','success'); };
    window.__pgGas=async ()=>{ const url=($('#pgGas').value||'').trim(); state.settings.gasUrl=url; saveState(); if(!url){ setSyncDot('idle'); toast('URL dikosongkan.','warn'); return; }
      toast('URL disimpan, menguji koneksi…','info');
      // Save dulu tanpa bergantung pada ping (GAS sering tidak balas action=ping karena redirect/CORS)
      setSyncDot('ok');
      try{ const r=await fetch(url+(url.includes('?')?'&':'?')+'action=ping',{redirect:'follow'}); const j=await r.json(); if(j&&j.ok){ toast('✅ Terhubung & verified.','success'); } }
      catch(e){ /* abaikan – tetap simpan, sinkron pakai POST yang punya fallback no-cors */ toast('URL tersimpan. Verifikasi ping dilewati (akan tetap sinkron via POST).','info'); }
      try{ await pullSpreadsheet(true); }catch(e){}
      navigate('pengaturan');
    };
    window.__pgTarif=()=>{
      state.settings.tahunAjaran=$('#pgTA').value;
      // No.7: simpan daftar bulan gratis
      state.settings.bulanGratis = $$('.pg-bgratis').filter(c=>c.checked).map(c=>c.value);
      // v14: per kelas
      const bkMap={}; $$('.pg-bgk').filter(c=>c.checked).forEach(c=>{ const k=c.dataset.k; (bkMap[k]=bkMap[k]||[]).push(c.value); });
      state.settings.bulanGratisKelas = bkMap;
      // v14: per siswa (gabung dengan yang sudah ada — UI hanya tampil 30 siswa terakhir dicari)
      const bsMap=Object.assign({}, state.settings.bulanGratisSiswa||{});
      // reset hanya siswa yang sedang ditampilkan
      const shown=new Set($$('.pg-bgs').map(c=>c.dataset.s));
      shown.forEach(id=>{ delete bsMap[id]; });
      $$('.pg-bgs').filter(c=>c.checked).forEach(c=>{ const id=c.dataset.s; (bsMap[id]=bsMap[id]||[]).push(c.value); });
      state.settings.bulanGratisSiswa = bsMap;
      // No.19: penandatangan laporan
      state.settings.ttdBendahara = ($('#pgTtdBend')?.value||'').trim();
      state.settings.ttdKepala    = ($('#pgTtdKepala')?.value||'').trim();
      saveState(); enqueue('settings','upsert',state.settings);
      $('#labelTA').textContent=state.settings.tahunAjaran;
      toast('✅ Pengaturan tersimpan. Tagihan tahunan diperbarui.','success');
      if(navigator.onLine) flushQueue(false).catch(()=>{});
    };
    window.__pgTutupBuku=()=>{
      const ny=parseInt(state.settings.tahunAjaran.split('/')[0],10)+1;
      const newTA = ny+'/'+(ny+1);
      if(!confirm('Tutup buku TA '+state.settings.tahunAjaran+' dan buka TA baru '+newTA+'? Siswa aktif tetap, status alumni akan dihapus jika sudah ada.')) return;
      // mark current siswa as alumni for those whose tahun_ajaran old (kept aktif since same TA — admin handles per-student)
      const list = state.settings.tahunAjaranList||[];
      if(!list.includes(newTA)) list.push(newTA);
      state.settings.tahunAjaranList = list;
      state.settings.tahunAjaran = newTA;
      saveState(); enqueue('settings','upsert',state.settings);
      $('#labelTA').textContent=newTA;
      toast('✅ Buku ditutup. TA aktif: '+newTA,'success');
      navigate('pengaturan');
    };
    window.__pgWASave=()=>{ state.settings.waSenderNumber=$('#pgWASend').value.trim(); state.settings.waTemplate=$('#pgWATmpl').value; saveState(); enqueue('settings','upsert',state.settings); toast('Tersimpan.'); };
    window.__pgPw=async ()=>{
      const u=sess(); const rec=state.users.find(x=>x.id===u.id);
      if(!rec){ toast('User tidak ditemukan.','error'); return; }
      const oldPw=$('#pwOld').value;
      if(String(rec.password||'')!==oldPw){ toast('Password lama salah.','error'); return; }
      const nw=$('#pwNew').value;
      if(!nw || nw.length<4){ toast('Min 4 karakter.','warn'); return; }
      rec.password=nw; rec.updated_at=new Date().toISOString();
      saveState();
      enqueue('users','upsert',rec);
      $('#pwOld').value=''; $('#pwNew').value='';
      toast('Menyimpan password baru…','info');
      try{ await flushQueue(false); }catch(e){}
      // Push snapshot juga supaya Spreadsheet kolom Users pasti ter-update,
      // mencegah pull berikutnya menimpa password baru dengan data lama.
      try{ await pushSnapshot(false); }catch(e){}
      toast('✅ Password diubah & tersinkron.','success');
    };
    window.__pgExp=()=>{ const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='infaq_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); };
    window.__pgImp=(input)=>{ const f=input.files[0]; if(!f) return; if(!confirm('Akan menimpa semua data lokal. Lanjut?')){ input.value=''; return; }
      const r=new FileReader(); r.onload=(e)=>{ try{ const o=JSON.parse(e.target.result); Object.assign(state,o); saveState(); toast('Tersimpan. Reload…'); setTimeout(()=>location.reload(),600); }catch(err){ toast('File tidak valid.','error'); } }; r.readAsText(f);
    };
  }
});

registerPage('admin-user',{title:'Kelola User / Guru',bgClass:'bg-white',adminOnly:true,
  render(){ return `<div class="max-w-3xl mx-auto"><button onclick="window.__uF()" data-testid="user-add" class="mb-3 bg-utama text-white font-bold rounded-lg py-2.5 px-4"><i class="fas fa-plus mr-1"></i>Tambah User</button>
    <div id="uL" class="divide-y border rounded-xl bg-white"></div></div>`; },
  mounted(){
    window.__uR=()=>{ $('#uL').innerHTML = state.users.map(u=>`<div class="p-3 flex items-center gap-3" data-testid="user-row-${u.id}">
      <div class="w-9 h-9 rounded-full ${u.role==='admin'?'bg-purple-100 text-purple-700':'bg-emerald-100 text-emerald-700'} flex items-center justify-center font-bold">${esc(u.nama[0]||'?')}</div>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold">${esc(u.nama)} <span class="text-[10px] bg-gray-100 px-1.5 rounded">${esc(u.role)}</span></p><p class="text-[11px] text-gray-500">@${esc(u.username)} ${u.no_wa?'· '+esc(u.no_wa):''}</p></div>
      <button onclick="window.__uF('${u.id}')" data-testid="user-edit-${u.id}" class="text-blue-600 px-2"><i class="fas fa-pen"></i></button>
      ${u.id !== (sess()?.id) ? `<button onclick="window.__uDel('${u.id}')" class="text-red-600 px-2"><i class="fas fa-trash"></i></button>` : ''}
    </div>`).join('');
    };
    window.__uR();
    window.__uF=(id)=>{ const u=id?state.users.find(x=>x.id===id):{id:'',username:'',password:'',nama:'',role:'guru',no_wa:'',aktif:true};
      openModal(modalBox((id?'Edit':'Tambah')+' User',`
        <form onsubmit="window.__uSave(event,'${id||''}')" class="space-y-3" data-testid="user-form">
          <div><label class="text-xs font-semibold">Nama *</label><input id="uf_n" value="${esc(u.nama||'')}" required class="w-full border rounded p-2 bg-gray-50"></div>
          <div><label class="text-xs font-semibold">Username *</label><input id="uf_u" value="${esc(u.username||'')}" required class="w-full border rounded p-2 bg-gray-50"></div>
          <div><label class="text-xs font-semibold">Password ${id?'(kosongkan jika tidak diubah)':''}</label><input id="uf_p" type="text" value="${id?'':esc(u.password||'')}" ${id?'':'required'} class="w-full border rounded p-2 bg-gray-50"></div>
          <div><label class="text-xs font-semibold">Role *</label><select id="uf_r" class="w-full border rounded p-2 bg-gray-50"><option value="guru" ${u.role==='guru'?'selected':''}>Guru</option><option value="admin" ${u.role==='admin'?'selected':''}>Bendahara Pusat</option></select></div>
          <div><label class="text-xs font-semibold">No WA</label><input id="uf_wa" value="${esc(u.no_wa||'')}" class="w-full border rounded p-2 bg-gray-50"></div>
          <div class="flex gap-2 pt-2"><button type="button" onclick="closeModal()" class="flex-1 border rounded-lg p-2.5 font-semibold">Batal</button><button type="submit" data-testid="user-save" class="flex-1 bg-utama text-white rounded-lg p-2.5 font-semibold">Simpan</button></div>
        </form>`));
    };
    window.__uSave=async (e,id)=>{ e.preventDefault();
      const d={ id:id||uid(), nama:$('#uf_n').value.trim(), username:$('#uf_u').value.trim(), role:$('#uf_r').value, no_wa:$('#uf_wa').value.trim(), aktif:true };
      const pw=$('#uf_p').value;
      if(!d.nama || !d.username){ toast('Nama & username wajib.','warn'); return; }
      // Cegah username duplikat
      const dup=state.users.find(x=>x.id!==(id||d.id) && String(x.username||'').toLowerCase()===d.username.toLowerCase());
      if(dup){ toast('Username sudah dipakai.','error'); return; }
      if(id){ const i=state.users.findIndex(x=>x.id===id); if(i>=0) state.users[i]={...state.users[i], ...d, password: pw||state.users[i].password, updated_at:new Date().toISOString()}; }
      else { d.password=pw; d.created_at=new Date().toISOString(); state.users.unshift(d); }
      saveState();
      enqueue('users','upsert',state.users.find(x=>x.id===(id||d.id)));
      closeModal(); window.__uR(); toast('Tersimpan, menyinkronkan…','info');
      try{ await flushQueue(false); }catch(_){}
      try{ await pushSnapshot(false); }catch(_){}
      toast('✅ Tersimpan & tersinkron.','success');
    };
    window.__uDel=(id)=>{ if(!confirm('Hapus user ini?')) return; state.users=state.users.filter(u=>u.id!==id); saveState(); enqueue('users','delete',{id}); window.__uR(); toast('Dihapus.','info'); };
  }
});

registerPage('admin-tunggakan-lalu',{title:'Tunggakan Tahun Lalu',bgClass:'bg-white',adminOnly:true,
  render(){ return `<div class="max-w-3xl mx-auto">
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4 text-xs text-amber-800"><i class="fas fa-info-circle mr-1"></i>Tunggakan akan otomatis tergabung dengan siswa aktif jika <b>NIS/NISN/Nama</b> sama.</div>

      </div>
      <button class="w-full bg-utama text-white font-bold py-2 rounded-lg" data-testid="tl-add">Tambah</button>
    </form>
    <h3 class="font-bold text-gray-700 text-sm mb-2">Impor Massal (CSV)</h3>
    <p class="text-[11px] text-gray-500 mb-2">Format: <code>nama,nis,nisn,jumlah,TA_referensi</code></p>
    <textarea id="tl_bulk" rows="4" class="w-full border bg-gray-50 rounded p-2 font-mono text-xs" data-testid="tl-bulk"></textarea>
    <button onclick="window.__tlBulk()" data-testid="tl-import" class="w-full bg-sky-600 text-white font-bold py-2 rounded-lg mt-2">Impor</button>
    <h3 class="font-bold text-gray-700 text-sm mt-4 mb-2">Data Tunggakan Lalu</h3>

  mounted(){

    window.__tlAdd=(e)=>{ e.preventDefault(); const d={id:uid(),nis:$('#tl_nis').value.trim(),nisn:$('#tl_nisn').value.trim(),nama:$('#tl_nama').value.trim(),jumlah:rupiahVal($('#tl_jumlah')),tahun_ajaran_referensi:$('#tl_taref').value.trim(),created_at:new Date().toISOString()};
      if(!d.nama||d.jumlah<=0){ toast('Lengkapi data.','warn'); return; }
      state.tunggakanLalu.unshift(d); saveState(); enqueue('tunggakanLalu','upsert',d); window.__tlR(); $('#tl_nis').value=$('#tl_nisn').value=$('#tl_nama').value=$('#tl_jumlah').value=''; toast('Tersimpan.');
    };
    window.__tlBulk=()=>{ const r=$('#tl_bulk').value.trim(); if(!r) return; let ok=0;
      r.split(/\r?\n/).filter(Boolean).forEach(l=>{ if(l.toLowerCase().startsWith('nama,')) return; const p=l.split(/[,;	]/).map(x=>x.trim()); const [nm,ni,nn,jm,ta]=p; if(nm&&+jm>0){ const o={id:uid(),nama:nm,nis:ni||'',nisn:nn||'',jumlah:+jm,tahun_ajaran_referensi:ta||'',created_at:new Date().toISOString()}; state.tunggakanLalu.unshift(o); enqueue('tunggakanLalu','upsert',o); ok++; } });

    window.__tlR();
  }
});

registerPage('admin-rekap-guru',{title:'Saldo Per Guru',bgClass:'bg-white',adminOnly:true,
  render(){ const gs=state.users.filter(u=>u.role==='guru'); const data=gs.map(g=>{
      const masuk=state.transaksi.filter(t=>t.input_user_id===g.id && (t.tipe==='kas_in'||t.tipe==='spp_in')).reduce((s,t)=>s+(+t.nominal||0),0);
      const keluar=state.transaksi.filter(t=>t.input_user_id===g.id && t.tipe==='kas_out').reduce((s,t)=>s+(+t.nominal||0),0);
      const setor=state.transaksi.filter(t=>t.input_user_id===g.id && t.tipe==='setor').reduce((s,t)=>s+(+t.nominal||0),0);
      return { g, masuk, keluar, setor, saldo: masuk-keluar-setor };
    });
    // v18 (item 13): guru dengan saldo>0 dianggap "menunggu setor" → tampilkan badge notifikasi
    const notifCnt=data.filter(r=>r.saldo>0).length;
    return `<div class="max-w-3xl mx-auto">
      ${notifCnt?`<div class="bg-amber-50 border border-amber-300 rounded-xl p-3 mb-3 flex items-center gap-2"><i class="fas fa-bell text-amber-600 text-lg animate-pulse"></i><div class="flex-1 text-sm text-amber-800"><b>${notifCnt} guru</b> memiliki saldo di tangan menunggu setor ke Bendahara Pusat.</div></div>`:''}
      <div class="divide-y border rounded-xl bg-white">${data.length?data.map(r=>`<div class="p-4" data-testid="rekap-guru-row-${r.g.id}"><div class="flex items-center justify-between"><p class="font-semibold">${esc(r.g.nama)} <span class="text-[10px] text-gray-500">@${esc(r.g.username)}</span>${r.saldo>0?' <span class="ml-1 text-[10px] bg-rose-600 text-white px-1.5 py-0.5 rounded-full font-bold">MENUNGGU SETOR</span>':''}</p><div class="flex gap-1"><button onclick="window.__guruDetail('${r.g.id}')" class="text-xs bg-sky-600 text-white font-bold px-3 py-1.5 rounded-lg"><i class="fas fa-eye mr-1"></i>Detail</button>${r.saldo>0?`<button onclick="window.__guruAckSetor('${r.g.id}')" class="text-xs bg-emerald-600 text-white font-bold px-3 py-1.5 rounded-lg"><i class="fas fa-check mr-1"></i>Terima Setoran</button>`:''}</div></div><div class="grid grid-cols-4 gap-2 mt-2 text-xs">
      <div class="bg-emerald-50 p-2 rounded text-center"><p class="text-emerald-700 font-bold uppercase text-[10px]">Masuk</p><p class="text-emerald-700 font-bold">${fmtIDR(r.masuk)}</p></div>
      <div class="bg-rose-50 p-2 rounded text-center"><p class="text-rose-700 font-bold uppercase text-[10px]">Keluar</p><p class="text-rose-700 font-bold">${fmtIDR(r.keluar)}</p></div>
      <div class="bg-sky-50 p-2 rounded text-center"><p class="text-sky-700 font-bold uppercase text-[10px]">Disetor</p><p class="text-sky-700 font-bold">${fmtIDR(r.setor)}</p></div>
      <div class="bg-amber-50 p-2 rounded text-center"><p class="text-amber-700 font-bold uppercase text-[10px]">Sisa</p><p class="${r.saldo>0?'text-rose-700':'text-emerald-700'} font-bold">${fmtIDR(r.saldo)}</p></div>
    </div></div>`).join(''):'<p class="p-3 text-sm text-gray-400 text-center">Belum ada guru.</p>'}</div></div>`;
  },
  mounted(){
    // v18 (item 11): tampilkan rincian pemasukan per guru
    window.__guruDetail=(gid)=>{
      const g=state.users.find(u=>u.id===gid); if(!g) return;
      const trs=state.transaksi.filter(t=>t.input_user_id===gid || t.guru_pj===g.nama).sort((a,b)=> new Date(b.tanggal)-new Date(a.tanggal));
      const rows=trs.length? trs.map(t=>{ const lbl = t.tipe==='spp_in'?('SPP '+(t.nama_siswa||'-')) : t.tipe==='kas_in'?('Kas Masuk · '+(t.kategori||'')) : t.tipe==='kas_out'?('Kas Keluar · '+(t.kategori||'')) : t.tipe==='setor'?'Setor ke Bendahara' : t.tipe; const cls = ['spp_in','kas_in'].includes(t.tipe)?'text-emerald-700':(t.tipe==='setor'?'text-sky-700':'text-rose-700'); const sign=['spp_in','kas_in'].includes(t.tipe)?'+':'-'; return `<div class="p-2 border-t text-xs flex justify-between"><div><b>${esc(lbl)}</b><br><span class="text-gray-500">${fmtDate(t.tanggal)} · ${(t.metode||'cash').toUpperCase()}${t.guru_pj?` · PJ: ${esc(t.guru_pj)}`:''}</span></div><span class="${cls} font-bold">${sign}${fmtIDR(t.nominal)}</span></div>`; }).join('') : '<p class="p-3 text-xs text-gray-400 text-center">Belum ada transaksi.</p>';
      openModal(modalBox('Rincian Saldo — '+g.nama, `<div class="max-h-[60vh] overflow-y-auto border rounded-lg">${rows}</div>`));
    };
    // v18 (item 13): terima setoran → saldo guru direset ke 0 via transaksi setor otomatis
    window.__guruAckSetor=(gid)=>{
      const g=state.users.find(u=>u.id===gid); if(!g) return;
      const sal=saldoUserDiTangan(gid); if(sal<=0){ toast('Saldo guru sudah 0.','info'); return; }
      const met=prompt('Terima setoran Rp '+fmtIDR(sal).replace('Rp ','')+' dari '+g.nama+'\n\nUang masuk ke:\n1 = Saldo Tunai (Cash)\n2 = Saldo Bank (Transfer)\n\nKetik 1 atau 2:','1');
      if(met!=='1' && met!=='2') return;
      const metode = met==='1'?'cash':'transfer';
      if(!confirm('Konfirmasi: TERIMA SETORAN '+fmtIDR(sal)+' dari '+g.nama+' via '+metode.toUpperCase()+'?\n\nSaldo guru akan direset ke 0.')) return;
      const adm=adminUser();
      const t1={ id:uid(), tipe:'setor', tanggal:new Date().toISOString(), tahun_ajaran:taLabel(), metode, nominal:sal, kategori:'Setor', keterangan:'Setor diterima Bendahara Pusat', input_user_id:gid, input_user_nama:g.nama, input_user_role:'guru', sumber:'tangan', created_at:new Date().toISOString() };
      const t2={ ...t1, id:uid(), tipe:'kas_in', kategori:'Setoran Guru', keterangan:'Terima setoran dari '+g.nama, input_user_id:adm.id, input_user_nama:adm.nama, input_user_role:'admin', sumber:'bendahara', ref_setor_id:t1.id };
      state.transaksi.unshift(t1,t2); saveState(); try{ enqueue('transaksi','upsert',t1); enqueue('transaksi','upsert',t2); }catch(_){}
      toast('✅ Setoran '+g.nama+' diterima. Saldo guru → 0.','success');
      navigate('admin-rekap-guru');
    };
  }
});

/* ====== ADMIN: STATISTIK POTENSI SPP PER JALUR (v14, No.9) ====== */
registerPage('admin-statistik-jalur',{title:'Potensi SPP per Jalur',bgClass:'bg-white',adminOnly:true,
  render(){
    const ta=taLabel();
    // Kelompokkan siswa aktif per jalur. Potensi/bulan = Σ pembayaran_bulanan tiap siswa.
    const jalurSet=new Set();
    state.siswa.filter(s=>(s.status||'aktif')==='aktif').forEach(s=>jalurSet.add((s.jalur||'Reguler').trim()));
    const jalurs=Array.from(jalurSet).sort();
    const M={}; let grand=0, grandSiswa=0;
    jalurs.forEach(j=>{ const ss=state.siswa.filter(s=>(s.status||'aktif')==='aktif' && (s.jalur||'Reguler').trim()===j); const pot=ss.reduce((x,s)=>x+getSppTarif(s),0); M[j]={siswa:ss.length,potBln:pot,potTh:pot*12}; grand+=pot; grandSiswa+=ss.length; });
    function jenj(j){ const u=j.toUpperCase(); if(u.includes('TK')) return 'TK'; if(u.includes('SMP')) return 'SMP'; if(u.includes('SD')) return 'SD'; return 'Lainnya'; }
    const grup={TK:[],SD:[],SMP:[],Lainnya:[]}; jalurs.forEach(j=>grup[jenj(j)].push(j));
    function tabel(group){
      const list=grup[group]; if(!list.length) return '';
      let subBln=0, subTh=0, subS=0;
      const rows=list.map(j=>{ const d=M[j]; subBln+=d.potBln; subTh+=d.potTh; subS+=d.siswa;
        const tag = d.potBln===0 ? ' <span class="text-[9px] bg-amber-100 text-amber-800 px-1 rounded">YATIM/KHUSUS</span>' : '';
        return `<tr class="border-t"><td class="px-2 py-1 font-semibold text-[11px]">${esc(j)}${tag}</td><td class="px-2 py-1 text-right text-[11px] font-bold">${d.siswa} siswa</td><td class="px-2 py-1 text-right text-[11px]">${d.potBln===0?'<span class=\"text-gray-400\">—</span>':fmtIDR(d.potBln)}</td><td class="px-2 py-1 text-right text-[11px] font-bold text-emerald-700">${d.potBln===0?'<span class=\"text-gray-400\">—</span>':fmtIDR(d.potTh)}</td></tr>`; }).join('');
      return `<div class="mb-5">
        <h3 class="font-bold text-gray-700 text-sm mb-2">📚 Jenjang ${group}</h3>
        <div class="overflow-x-auto border rounded-lg">
          <table class="min-w-full text-xs">
            <thead class="bg-slate-800 text-white"><tr><th class="px-2 py-2 text-left">Jalur</th><th class="px-2 py-2 text-right">Σ Siswa</th><th class="px-2 py-2 text-right">Potensi/Bulan</th><th class="px-2 py-2 text-right">Potensi/Tahun</th></tr></thead>
            <tbody>${rows}</tbody>
            <tfoot><tr class="border-t-2"><td class="px-2 py-1 font-bold text-[11px] bg-emerald-50">Subtotal ${group}</td><td class="px-2 py-1 text-right font-bold bg-emerald-50">${subS}</td><td class="px-2 py-1 text-right font-bold bg-emerald-50">${fmtIDR(subBln)}</td><td class="px-2 py-1 text-right font-extrabold bg-emerald-100 text-emerald-800">${fmtIDR(subTh)}</td></tr></tfoot>
          </table>
        </div>
      </div>`;
    }
    return `<div class="max-w-6xl mx-auto">
      <div class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white rounded-xl p-4 mb-4 shadow">
        <p class="text-xs uppercase tracking-wide text-emerald-100">Potensi SPP per Jalur (berdasarkan Pembayaran Bulanan tiap siswa aktif)</p>
        <h2 class="text-2xl font-extrabold">${fmtIDR(grand)} <span class="text-sm font-medium text-emerald-100">/ bulan</span></h2>
        <p class="text-xs text-emerald-100">TA ${esc(ta)} · ${grandSiswa} siswa aktif · Setahun: <b>${fmtIDR(grand*12)}</b></p>
      </div>
      ${tabel('TK')}${tabel('SD')}${tabel('SMP')}${tabel('Lainnya')}
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-[11px] text-amber-800">
        <i class="fas fa-info-circle mr-1"></i>Angka <b>Potensi</b> = Σ <i>pembayaran_bulanan</i> siswa aktif × jumlah bulan. Bukan realisasi pembayaran.
      </div>
    </div>`;
  }
});
