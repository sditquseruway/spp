registerPage('admin-jurnal-siswa',{title:'Jurnal Harian Pembayaran Siswa',bgClass:'bg-white',adminOnly:true,
  render(){
    return `<div class="max-w-6xl mx-auto">
      <div id="jsCards" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4"></div>
      <div class="bg-gray-50 border rounded-xl p-3 mb-3 flex flex-wrap gap-2 items-end">
        <div>
          <label class="block text-[11px] font-semibold text-gray-600 mb-1">Periode</label>
          <select id="jsMode" class="border bg-white rounded-lg p-2 text-sm">
            <option value="harian">Harian</option>
            <option value="bulanan">Bulanan</option>
            <option value="semua">Semua</option>
          </select>
        </div>
        <div id="jsDateWrap">
          <label class="block text-[11px] font-semibold text-gray-600 mb-1">Tanggal</label>
          <input id="jsDate" type="date" class="border bg-white rounded-lg p-2 text-sm">
        </div>
        <div id="jsMonthWrap" class="hidden">
          <label class="block text-[11px] font-semibold text-gray-600 mb-1">Bulan</label>
          <input id="jsMonth" type="month" class="border bg-white rounded-lg p-2 text-sm">
        </div>
        <div>
          <label class="block text-[11px] font-semibold text-gray-600 mb-1">Metode</label>
          <select id="jsMet" class="border bg-white rounded-lg p-2 text-sm">
            <option value="">Semua</option><option value="cash">Cash</option><option value="transfer">Transfer</option>
          </select>
        </div>
        <div class="flex-1 min-w-[160px]">
          <label class="block text-[11px] font-semibold text-gray-600 mb-1">Cari Nama / Kelas</label>
          <input id="jsQ" placeholder="Cari…" class="w-full border bg-white rounded-lg p-2 text-sm">
        </div>
        <button onclick="window.__jsRefresh()" data-testid="js-refresh" class="bg-utama text-white font-bold rounded-lg px-4 py-2 text-sm"><i class="fas fa-rotate mr-1"></i>Terapkan</button>
      </div>
      <div class="overflow-x-auto border rounded-xl bg-white">
        <table class="w-full text-sm" data-testid="js-table">
          <thead class="bg-emerald-50 text-emerald-800 text-xs uppercase">
            <tr><th class="p-2 text-left">No</th><th class="p-2 text-left">Tanggal / Waktu</th><th class="p-2 text-left">Nama Siswa</th><th class="p-2 text-left">Uraian Bayar</th><th class="p-2 text-left">Dibayarkan Ke</th><th class="p-2 text-right">Total Bayar</th><th class="p-2 text-center">Metode</th></tr>
          </thead>
          <tbody id="jsBody"></tbody>
          <tfoot id="jsFoot" class="bg-gray-50 font-bold"></tfoot>
        </table>
      </div>
    </div>`;
  },
  mounted(){
    const today=new Date().toISOString().slice(0,10);
    $('#jsDate').value=today;
    $('#jsMonth').value=today.slice(0,7);
    $('#jsMode').addEventListener('change',()=>{
      const m=$('#jsMode').value;
      $('#jsDateWrap').classList.toggle('hidden', m!=='harian');
      $('#jsMonthWrap').classList.toggle('hidden', m!=='bulanan');
      window.__jsRefresh();
    });
    ['jsDate','jsMonth','jsMet','jsQ'].forEach(id=>$('#'+id).addEventListener('input',()=>window.__jsRefresh()));

    window.__jsRefresh=()=>{
      const mode=$('#jsMode').value, met=$('#jsMet').value, q=$('#jsQ').value.trim().toLowerCase();
      const dStr=$('#jsDate').value, mStr=$('#jsMonth').value;
      const siswaById={}; state.siswa.forEach(s=>siswaById[s.id]=s);
      const userById={}; state.users.forEach(u=>userById[u.id]=u);
      const all=state.transaksi.filter(t=>t.tipe==='spp_in');
      // cards (selalu hari ini & bulan ini, terlepas dari filter tabel)
      const td=new Date(), tdIso=td.toISOString().slice(0,10), tdMo=tdIso.slice(0,7);
      const sumOf=(arr,cond,key)=>arr.filter(cond).reduce((s,t)=>s+(+t.nominal||0),0);
      const isToday=t=>(t.tanggal||'').slice(0,10)===tdIso;
      const isMonth=t=>(t.tanggal||'').slice(0,7)===tdMo;
      const tHari=sumOf(all,isToday);
      const tHariC=sumOf(all,t=>isToday(t)&&(t.metode||'cash')==='cash');
      const tHariT=sumOf(all,t=>isToday(t)&&(t.metode||'cash')==='transfer');
      const tBln=sumOf(all,isMonth);
      const tBlnC=sumOf(all,t=>isMonth(t)&&(t.metode||'cash')==='cash');
      const tBlnT=sumOf(all,t=>isMonth(t)&&(t.metode||'cash')==='transfer');
      const cntHari=all.filter(isToday).length;
      const cntBln=all.filter(isMonth).length;
      $('#jsCards').innerHTML=`
        <div class="bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-2xl p-4 text-white shadow-lg">
          <p class="text-[11px] uppercase text-emerald-100">Total Bayar Hari Ini</p>
          <h2 class="text-2xl font-extrabold" data-testid="js-total-hari">${fmtIDR(tHari)}</h2>
          <p class="text-[11px] text-emerald-100 mb-2">${cntHari} transaksi · ${fmtDate(td.toISOString())}</p>
          <div class="grid grid-cols-2 gap-2 text-xs">
            <div class="bg-white/15 rounded p-1.5">💵 Cash<br><b>${fmtIDR(tHariC)}</b></div>
            <div class="bg-white/15 rounded p-1.5">🏦 Transfer<br><b>${fmtIDR(tHariT)}</b></div>
          </div>
        </div>
        <div class="bg-gradient-to-br from-sky-500 to-sky-700 rounded-2xl p-4 text-white shadow-lg">
          <p class="text-[11px] uppercase text-sky-100">Total Bayar Bulan Ini</p>
          <h2 class="text-2xl font-extrabold" data-testid="js-total-bulan">${fmtIDR(tBln)}</h2>
          <p class="text-[11px] text-sky-100 mb-2">${cntBln} transaksi · ${tdMo}</p>
          <div class="grid grid-cols-2 gap-2 text-xs">
            <div class="bg-white/15 rounded p-1.5">💵 Cash<br><b>${fmtIDR(tBlnC)}</b></div>
            <div class="bg-white/15 rounded p-1.5">🏦 Transfer<br><b>${fmtIDR(tBlnT)}</b></div>
          </div>
        </div>`;
      // table data
      let rows=all.slice();
      if(mode==='harian') rows=rows.filter(t=>(t.tanggal||'').slice(0,10)===dStr);
      else if(mode==='bulanan') rows=rows.filter(t=>(t.tanggal||'').slice(0,7)===mStr);
      if(met) rows=rows.filter(t=>(t.metode||'cash')===met);
      if(q) rows=rows.filter(t=>{ const s=siswaById[t.siswa_id]; const nm=(s?.nama||t.siswa_nama||'').toLowerCase(); const kl=(s?(s.jenjang+' '+s.kelas):'').toLowerCase(); return nm.includes(q)||kl.includes(q); });
      rows.sort((a,b)=> new Date(b.tanggal) - new Date(a.tanggal));
      const body=$('#jsBody');
      if(!rows.length){ body.innerHTML='<tr><td colspan="7" class="p-4 text-center text-gray-400">Tidak ada transaksi.</td></tr>'; $('#jsFoot').innerHTML=''; return; }
      body.innerHTML=rows.map((t,i)=>{
        const s=siswaById[t.siswa_id]||{};
        const u=userById[t.input_user_id]||{nama:t.input_user_nama||'-'};
        const bulan=Array.isArray(t.bulan)?t.bulan.join(', '):(t.bulan||'-');
        const met=(t.metode||'cash')==='transfer'?'<span class="bg-sky-100 text-sky-700 px-2 py-0.5 rounded-full text-[10px] font-bold">🏦 TRANSFER</span>':'<span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full text-[10px] font-bold">💵 CASH</span>';
        return `<tr class="border-t hover:bg-emerald-50/40" data-testid="js-row-${t.id}">
          <td class="p-2 text-gray-500">${i+1}</td>
          <td class="p-2 whitespace-nowrap">${fmtDateTime(t.tanggal)}</td>
          <td class="p-2"><p class="font-semibold">${esc(s.nama||t.siswa_nama||'-')}</p><p class="text-[11px] text-gray-500">${esc((s.jenjang||'')+' '+(s.kelas||''))}</p></td>
          <td class="p-2 text-xs">SPP ${esc(bulan)}${t.keterangan?'<br><span class="text-gray-500">'+esc(t.keterangan)+'</span>':''}</td>
          <td class="p-2 text-xs">${esc(u.nama||'-')}<br><span class="text-[10px] text-gray-500">${esc(t.input_user_role||'')}</span></td>
          <td class="p-2 text-right font-bold text-emerald-700">${fmtIDR(t.nominal)}</td>
          <td class="p-2 text-center">${met}</td>
        </tr>`;
      }).join('');
      const tot=rows.reduce((s,t)=>s+(+t.nominal||0),0);
      const totC=rows.filter(t=>(t.metode||'cash')==='cash').reduce((s,t)=>s+(+t.nominal||0),0);
      const totT=rows.filter(t=>(t.metode||'cash')==='transfer').reduce((s,t)=>s+(+t.nominal||0),0);
      $('#jsFoot').innerHTML=`<tr><td colspan="5" class="p-2 text-right">Total (${rows.length} trx) — 💵 ${fmtIDR(totC)} · 🏦 ${fmtIDR(totT)}</td><td class="p-2 text-right text-emerald-700" data-testid="js-grand">${fmtIDR(tot)}</td><td></td></tr>`;
    };
    window.__jsRefresh();
  }
});

          <thead class="bg-purple-50 text-purple-800 text-xs uppercase">
            <tr><th class="p-2 text-left">No</th><th class="p-2 text-left">Tanggal / Waktu</th><th class="p-2 text-left">Jenis</th><th class="p-2 text-left">Kategori</th><th class="p-2 text-left">Keterangan</th><th class="p-2 text-left">Oleh</th><th class="p-2 text-right">Masuk</th><th class="p-2 text-right">Keluar</th><th class="p-2 text-center">Metode</th></tr>

  mounted(){

    $('#jkMode').addEventListener('change',()=>{ const m=$('#jkMode').value; $('#jkDateWrap').classList.toggle('hidden',m!=='harian'); $('#jkMonthWrap').classList.toggle('hidden',m!=='bulanan'); window.__jkRefresh(); });
    ['jkDate','jkMonth','jkType','jkMet','jkQ'].forEach(id=>$('#'+id).addEventListener('input',()=>window.__jkRefresh()));

    window.__jkRefresh=()=>{
      const mode=$('#jkMode').value, typ=$('#jkType').value, met=$('#jkMet').value, q=$('#jkQ').value.trim().toLowerCase();
      const dStr=$('#jkDate').value, mStr=$('#jkMonth').value;
      const userById={}; state.users.forEach(u=>userById[u.id]=u);

      const td=new Date(), tdIso=td.toISOString().slice(0,10), tdMo=tdIso.slice(0,7);
      const sIn=(arr,cond)=>arr.filter(t=>cond(t)&&t.tipe==='kas_in').reduce((s,t)=>s+(+t.nominal||0),0);
      const sOut=(arr,cond)=>arr.filter(t=>cond(t)&&t.tipe==='kas_out').reduce((s,t)=>s+(+t.nominal||0),0);
      const isToday=t=>(t.tanggal||'').slice(0,10)===tdIso;
      const isMonth=t=>(t.tanggal||'').slice(0,7)===tdMo;
      const inH=sIn(all,isToday), outH=sOut(all,isToday), inM=sIn(all,isMonth), outM=sOut(all,isMonth);
      $('#jkCards').innerHTML=`

          <p class="text-[11px] uppercase text-emerald-100">Hari Ini · ${fmtDate(td.toISOString())}</p>

          <td class="p-2 whitespace-nowrap">${fmtDateTime(t.tanggal)}</td>

    };
    window.__jkRefresh();

});

/* ====== RECEIPT (v14, No.11): tombol kembali di atas + rekap 12 bulan ====== */
registerPage('receipt',{title:'Bukti Pembayaran Infaq Syahriyah',bgClass:'bg-gray-100',
  render(params){ const t=state.transaksi.find(x=>x.id===params.id); if(!t) return '<p class="p-4 text-center text-gray-500">Transaksi tidak ditemukan.</p>';
    const s=state.siswa.find(x=>x.id===t.siswa_id)||{};
    const ta=t.tahun_ajaran||taLabel();
    const tarif=getSppTarif(s);
    const [y1,y2]=taYears(ta);
    const bMapRp = bulanTerbayarRp(s.id, ta);
    const free = bulanGratisFor(s);
    // tahun kalender utk tiap bulan dalam TA
    function tahunUntukBulan(b){ const idx=BULAN_LIST.indexOf(b); return idx<6 ? y1 : y2; }
    // total bayar hari ini
    const todayIso = new Date().toISOString().slice(0,10);
    const todayBayar = state.transaksi.filter(x=>x.tipe==='spp_in' && x.siswa_id===s.id && (x.tanggal||'').slice(0,10)===todayIso).reduce((a,x)=>a+Number(x.nominal||0),0);
    // tanggal singkat per bulan: cari trx terakhir yang menyentuh bulan tsb
    function tanggalTrxBulan(b){ const arr=state.transaksi.filter(x=>x.tipe==='spp_in' && x.siswa_id===s.id && (x.tahun_ajaran||taLabel())===ta && (Array.isArray(x.bulan)?x.bulan.includes(b):false || (x.bulan_nominal && b in x.bulan_nominal))); if(!arr.length) return ''; const tg=arr[0].tanggal; try{ const d=new Date(tg); return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2); }catch(_){ return ''; } }
    // 2 kolom: kiri = 6 bulan pertama TA (Juli-Des), kanan = 6 bulan terakhir (Jan-Jun)
    const kiri=BULAN_LIST.slice(0,6), kanan=BULAN_LIST.slice(6);
    function baris(b){
      const isFree=free.has(b);
      const paid=bMapRp[b]||0;
      const lunas=!isFree && tarif>0 && paid>=tarif;
      const stat = isFree?'GRATIS' : lunas?'LUNAS' : paid>0?'BLM' : 'BLM';
      const nom = isFree ? '-' : (paid>0 ? fmtIDR(paid) : fmtIDR(tarif));
      const tg = tanggalTrxBulan(b);
      const tgTxt = tg?' '+tg:'';
      return `<div class="cell"><span>${b.slice(0,3)}'${String(tahunUntukBulan(b)).slice(-2)}${tgTxt}</span><span>${nom} <b style="color:${isFree?'#b45309':(lunas?'#059669':'#dc2626')}">${stat}</b></span></div>`;
    }
    const grid12 = `<div class="grid2">${kiri.map(baris).join('')}${kanan.map(baris).join('')}</div>`;
    const no='TRX-'+new Date(t.tanggal).toISOString().slice(0,10).replace(/-/g,'')+'-'+t.id.slice(-5).toUpperCase();
    const logo=state.settings.logoDataURL ? `<img class="r-logo" src="${state.settings.logoDataURL}" alt="">` : '';
    return `<div class="max-w-md mx-auto">
      <div class="grid grid-cols-1 gap-2 mb-3 no-print">
        <button onclick="navigate('spp')" data-testid="resi-back-bayar" class="bg-amber-500 text-white font-bold py-3 rounded-lg"><i class="fas fa-arrow-left mr-1"></i>Kembali ke Menu Bayar SPP</button>
      </div>
      <div class="bg-white shadow-2xl rounded-xl overflow-hidden">
        <div id="receiptCanvas">
          ${logo}
          <div class="r-title">BUKTI PEMBAYARAN INFAQ SYAHRIYAH</div>
          <div class="r-sub" style="font-weight:700;margin-top:2px">${esc(sek())}</div>
          <div class="r-sub">${esc(alm())}</div>
          <hr>
          <div class="row"><span>No. Resi</span><span><b>${no}</b></span></div>
          <div class="row"><span>Tanggal</span><span>${fmtDate(t.tanggal)}</span></div>
          <div class="row"><span>TA</span><span>${esc(ta)}</span></div>
          <div class="row"><span>Kasir</span><span>${esc(t.input_user_nama||'-')}</span></div>
          <div class="row"><span>Metode</span><span><b>${(t.metode||'cash')==='cash'?'💵 CASH':'🏦 TRANSFER'}</b></span></div>
          <hr>
          <div class="row"><span>Nama</span><span><b>${esc(t.nama_siswa||s.nama||'-')}</b></span></div>
          <div class="row"><span>NIS / NISN</span><span>${esc(t.nis||s.nis||'-')} / ${esc(t.nisn||s.nisn||'-')}</span></div>
          <div class="row"><span>Jenjang/Kelas</span><span><b>${esc(t.jenjang||s.jenjang||'-')}/${esc(t.kelas||s.kelas||'-')}</b></span></div>
          <div class="row"><span>Tarif/bln</span><span>${fmtIDR(tarif)}</span></div>
          <hr>
          <div style="font-weight:700;margin:4px 0 2px;text-align:center">REKAP PEMBAYARAN SISWA TA ${esc(ta)}</div>
          ${grid12}
          <hr>
          <div class="row total"><span>TOTAL BAYAR HARI INI<br><span style="font-size:10px;font-weight:400">(${fmtDate(t.tanggal)})</span></span><span>${fmtIDR(todayBayar||t.nominal)}</span></div>
          <hr>
          <div class="r-sub" style="font-size:9.5px;line-height:1.4;margin-top:4px"><b>SIMPAN BUKTI INI. Jika perlu, screenshot & kirim via WhatsApp.</b></div>
          <div class="r-sub" style="margin-top:6px">Jazākumullāhu khairan.<br>Semoga ilmu putra/putri Bapak/Ibu berkah. 🤲</div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2 mt-4 no-print">
        <button onclick="window.__rPr()" data-testid="resi-print" class="bg-slate-700 text-white font-bold py-3 rounded-lg"><i class="fas fa-print mr-1"></i>Cetak</button>
        <button onclick="window.__rDl()" data-testid="resi-download" class="bg-sky-600 text-white font-bold py-3 rounded-lg"><i class="fas fa-image mr-1"></i>Simpan Gambar</button>
        <button onclick="window.__rWA('${t.id}')" data-testid="resi-wa" class="col-span-2 bg-[#25D366] text-white font-bold py-3 rounded-lg"><i class="fab fa-whatsapp mr-1"></i>Kirim Foto Resi ke WhatsApp Wali</button>
      </div>
    </div>`; },
  mounted(params){ const t=state.transaksi.find(x=>x.id===params.id); if(!t) return; const s=state.siswa.find(x=>x.id===t.siswa_id)||{};
    try { const bb=document.getElementById('btnBack'); if(bb){ bb.onclick=()=>navigate('spp'); } } catch(_){}
    window.__rPr=()=>window.print();
    async function __waitLogo(){
      // v18 (item 9): pastikan logo di resi selesai load sebelum snapshot
      const imgs=$('#receiptCanvas').querySelectorAll('img');
      await Promise.all(Array.from(imgs).map(img=>{
        if(img.complete && img.naturalWidth>0) return;
        try{ img.crossOrigin='anonymous'; }catch(_){}
        return new Promise(res=>{ img.onload=()=>res(); img.onerror=()=>res(); setTimeout(res,1500); });
      }));
    }
    window.__rDl=async ()=>{
      if(!window.html2canvas){ toast('Library belum siap.','warn'); return; }
      await __waitLogo();
      const c=await window.html2canvas($('#receiptCanvas'),{backgroundColor:'#fff',scale:2,useCORS:true,allowTaint:false});
      const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='Resi_'+(t.nama_siswa||'siswa')+'_'+new Date(t.tanggal).toISOString().slice(0,10)+'.png'; a.click(); toast('Disimpan.');
    };
    window.__rWA=async ()=>{
      const wa=normalizeWA(s.no_wa||'');
      if(!wa){ toast('No WA wali belum diisi pada data siswa.','warn'); return; }
      if(!window.html2canvas){ toast('Library belum siap.','warn'); return; }
      await __waitLogo();
      const c=await window.html2canvas($('#receiptCanvas'),{backgroundColor:'#fff',scale:2,useCORS:true,allowTaint:false});
      const du=c.toDataURL('image/png');
      const txt = '*BUKTI PEMBAYARAN INFAQ SYAHRIYAH*%0A'+encodeURIComponent(sek())+'%0A%0AAssalāmuʿalaikum Bapak/Ibu Wali Santri%0A%0AAtas nama: *'+encodeURIComponent(t.nama_siswa||s.nama||'')+'*%0ATanggal: '+encodeURIComponent(fmtDate(t.tanggal))+'%0ATotal: *'+encodeURIComponent(fmtIDR(t.nominal))+'*%0A%0AFoto bukti pembayaran terlampir.%0AJazākumullāhu khairan. 🙏';
      try{ const blob=await (await fetch(du)).blob(); const file=new File([blob],'Resi.png',{type:'image/png'}); if(navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file], title:'Bukti Pembayaran', text:decodeURIComponent(txt.replace(/%0A/g,'\n').replace(/\*/g,''))}); return; } }catch(e){}
      const a=document.createElement('a'); a.href=du; a.download='Resi_'+(t.nama_siswa||'siswa')+'.png'; a.click();
      window.open('https://wa.me/'+wa+'?text='+txt,'_blank');
      toast('Foto resi diunduh & chat WA wali terbuka.','info');
    };
  }
});
})();</script>

<script>
/* ===== PWA Install (Single-HTML, tanpa Service Worker terpisah) ===== */
(function(){
  // Manifest default inline (data URL) -- akan di-override oleh applyLogo() saat logo tersedia.
  try{
    var mf={name:"Infaq Santri App",short_name:"Infaq Santri",start_url:location.pathname,scope:location.pathname.replace(/[^/]*$/,''),display:"standalone",background_color:"#064e3b",theme_color:"#064e3b",icons:[{src:"https://iili.io/fFA80TF.md.png",sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:"https://iili.io/fFA80TF.md.png",sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
    var link=document.getElementById('pwaManifest');
    if(link){ link.href='data:application/manifest+json;charset=utf-8,'+encodeURIComponent(JSON.stringify(mf)); }
  }catch(e){}
  // Bersihkan service worker LAMA (sw.js) yang mungkin masih ter-register dari versi sebelumnya.
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(rs){
      rs.forEach(function(r){ try{ r.unregister(); }catch(_){ } });
    }).catch(function(){});
  }
  var __deferredInstall=null;
  function __toggleInstallBtns(show){
    ['btnInstall','btnInstallLogin'].forEach(function(id){
      var b=document.getElementById(id); if(!b) return;
      if(show){ b.classList.remove('hidden'); if(id==='btnInstall') b.classList.add('flex'); }
      else { b.classList.add('hidden'); if(id==='btnInstall') b.classList.remove('flex'); }
    });
  }
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault(); __deferredInstall=e; __toggleInstallBtns(true);
  });
  window.addEventListener('appinstalled',function(){
    __deferredInstall=null; __toggleInstallBtns(false);
    if(window.toast) toast('✅ Aplikasi terpasang.','success');
  });
  window.installPWA=async function(){
    if(__deferredInstall){
      __deferredInstall.prompt();
      var c=await __deferredInstall.userChoice;
      __deferredInstall=null;
      __toggleInstallBtns(false);
      if(window.toast) toast(c.outcome==='accepted'?'Memasang aplikasi…':'Pemasangan dibatalkan.', c.outcome==='accepted'?'success':'info');
    }else{
      var ua=navigator.userAgent||'';
      var isIOS=/iPad|iPhone|iPod/.test(ua);
      alert(isIOS
        ? 'Untuk memasang di iPhone/iPad:\n1) Tekan ikon Share (kotak panah ke atas)\n2) Pilih "Add to Home Screen"'
        : 'Buka menu browser (⋮) lalu pilih "Install app" atau "Add to Home Screen".');
    }
  };
})();
</script>
